<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#0a0f1a"/>
<title>A.G. Rhodes — Meal Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:#0a0f1a;--surface:#111827;--border:#1f2d42;--card:#141e2e;
    --accent:#00c896;--accent2:#0ea5e9;--gold:#f59e0b;--danger:#ef4444;
    --text:#f0f6ff;--muted:#6b7f99;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);
    min-height:100dvh;display:flex;flex-direction:column;align-items:center;
    justify-content:center;padding:20px;}

  .logo{font-family:'Syne',sans-serif;font-size:1.5rem;font-weight:800;margin-bottom:4px;text-align:center;}
  .logo span{color:var(--accent);}
  .tagline{color:var(--muted);font-size:.82rem;margin-bottom:20px;text-align:center;}
  .clock{color:var(--muted);font-size:.78rem;margin-bottom:18px;font-variant-numeric:tabular-nums;text-align:center;}

  .card{background:var(--surface);border:1px solid var(--border);border-radius:24px;
    padding:28px 24px;width:100%;max-width:420px;}
  .card h2{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;margin-bottom:18px;text-align:center;}

  /* Steps */
  .steps{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:22px;}
  .step{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    font-size:.72rem;font-weight:700;border:2px solid var(--border);color:var(--muted);transition:all .3s;}
  .step.active{border-color:var(--accent);color:var(--accent);background:rgba(0,200,150,.1);}
  .step.done{border-color:var(--accent);background:var(--accent);color:#000;}
  .step-line{flex:1;height:2px;background:var(--border);max-width:36px;transition:background .3s;}
  .step-line.done{background:var(--accent);}

  /* Input */
  #empId{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:14px;
    padding:18px;font-size:1.25rem;font-family:inherit;color:var(--text);outline:none;
    text-align:center;letter-spacing:.2em;text-transform:uppercase;margin-bottom:14px;
    transition:border-color .2s;-webkit-appearance:none;}
  #empId:focus{border-color:var(--accent);}
  #empId::placeholder{letter-spacing:normal;text-transform:none;color:var(--muted);font-size:.95rem;}

  /* Buttons */
  .btn{width:100%;padding:17px;border-radius:14px;border:none;font-size:1rem;font-weight:700;
    font-family:inherit;cursor:pointer;transition:all .2s;-webkit-appearance:none;}
  .btn-accent{background:var(--accent);color:#fff;}
  .btn-accent:active{transform:scale(.98);background:#00a87d;}
  .btn-accent:disabled{opacity:.5;cursor:not-allowed;transform:none;}
  .btn-ghost{background:var(--card);border:1.5px solid var(--border);color:var(--muted);margin-top:10px;}
  .btn-ghost:active{border-color:var(--accent2);}

  /* Employee banner */
  .emp-banner{background:rgba(0,200,150,.06);border:1px solid rgba(0,200,150,.18);
    border-radius:12px;padding:14px 16px;margin-bottom:18px;display:flex;align-items:center;gap:12px;}
  .emp-banner .icon{font-size:1.5rem;}
  .emp-banner .name{font-family:'Syne',sans-serif;font-size:1rem;font-weight:800;}
  .emp-banner .dept{font-size:.76rem;color:var(--muted);}

  /* Meal options */
  .meal-choices{display:flex;gap:12px;margin-bottom:16px;}
  .meal-opt{flex:1;padding:18px 10px;border-radius:16px;border:2px solid var(--border);
    background:var(--card);cursor:pointer;text-align:center;transition:all .25s;
    -webkit-appearance:none;font-family:inherit;display:flex;flex-direction:column;
    align-items:center;gap:5px;}
  .meal-opt:active{transform:scale(.97);}
  .meal-opt.sel-single{border-color:var(--accent);background:rgba(0,200,150,.08);}
  .meal-opt.sel-bundle{border-color:var(--gold);background:rgba(245,158,11,.08);}
  .meal-opt .oi{font-size:1.8rem;}
  .meal-opt .ot{font-family:'Syne',sans-serif;font-size:.92rem;font-weight:800;color:var(--text);}
  .meal-opt .op{font-size:1.3rem;font-weight:700;}
  .single-color{color:var(--accent);}
  .bundle-color{color:var(--gold);}
  .meal-opt .os{font-size:.68rem;color:var(--muted);line-height:1.3;}
  .save-badge{font-size:.7rem;font-weight:700;color:var(--gold);background:rgba(245,158,11,.15);
    padding:2px 8px;border-radius:100px;}

  /* Free meal */
  .free-banner{background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.25);
    border-radius:14px;padding:20px;text-align:center;margin-bottom:16px;}
  .free-banner .fi{font-size:2rem;margin-bottom:6px;}
  .free-banner .ft{font-family:'Syne',sans-serif;font-size:1.1rem;font-weight:800;color:var(--gold);}
  .free-banner .fs{font-size:.8rem;color:var(--muted);margin-top:4px;}

  /* Result */
  .result{padding:20px;border-radius:16px;text-align:center;animation:fadeIn .3s ease;}
  @keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
  .res-success{background:rgba(0,200,150,.07);border:1.5px solid rgba(0,200,150,.22);}
  .res-free{background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.28);}
  .res-bundle{background:rgba(14,165,233,.07);border:1.5px solid rgba(14,165,233,.22);}
  .res-error{background:rgba(239,68,68,.07);border:1.5px solid rgba(239,68,68,.22);}
  .res-warn{background:rgba(245,158,11,.07);border:1.5px solid rgba(245,158,11,.22);}
  .ri{font-size:2.4rem;margin-bottom:8px;}
  .rn{font-family:'Syne',sans-serif;font-size:1.35rem;font-weight:800;margin-bottom:3px;}
  .rd{color:var(--accent2);font-size:.8rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:10px;}
  .rm{color:var(--muted);font-size:.86rem;margin-bottom:8px;}
  .rp{display:inline-block;border-radius:100px;padding:6px 18px;font-weight:700;font-size:.92rem;margin-top:6px;}
  .rp-green{background:rgba(0,200,150,.15);color:var(--accent);}
  .rp-gold{background:rgba(245,158,11,.15);color:var(--gold);}
  .rp-blue{background:rgba(14,165,233,.12);color:var(--accent2);}
  .credits{display:inline-block;margin-top:8px;background:rgba(14,165,233,.1);border-radius:100px;
    padding:4px 14px;color:var(--accent2);font-size:.78rem;font-weight:600;}

  /* Error */
  .inline-err{margin-top:12px;padding:11px;background:rgba(239,68,68,.1);
    border:1px solid rgba(239,68,68,.25);border-radius:10px;color:#ef4444;
    font-size:.84rem;text-align:center;display:none;}

  /* Divider */
  .divider{display:flex;align-items:center;gap:10px;margin:16px 0;color:var(--muted);font-size:.76rem;}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border);}

  #feedbackBtn{width:100%;padding:13px;border-radius:12px;border:1.5px solid var(--border);
    background:transparent;color:var(--muted);font-size:.85rem;font-weight:600;
    font-family:inherit;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;}
  #feedbackBtn:active{border-color:var(--gold);color:var(--gold);}

  .back-btn{background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;
    font-family:inherit;margin-top:12px;display:block;width:100%;text-align:center;}
  .admin-link{margin-top:20px;font-size:.72rem;text-align:center;}
  .admin-link a{color:var(--muted);text-decoration:none;}

  .spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;
    border-radius:50%;animation:spin .7s linear infinite;display:inline-block;
    margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}

  .screen{display:none;}
  .screen.active{display:block;}
</style>
</head>
<body>

<div class="logo">🍽 Meal<span>Track</span></div>
<div class="tagline">A.G. Rhodes Atlanta</div>
<div class="clock" id="clk"></div>

<div class="card">
  <div class="steps">
    <div class="step active" id="s1">1</div>
    <div class="step-line" id="l1"></div>
    <div class="step" id="s2">2</div>
    <div class="step-line" id="l2"></div>
    <div class="step" id="s3">3</div>
  </div>

  <!-- Screen 1: ID Entry -->
  <div class="screen active" id="scr-id">
    <h2>Enter Employee ID</h2>
    <input type="text" id="empId" placeholder="Enter your Employee ID"
      maxlength="20" autocomplete="off" autocorrect="off"
      autocapitalize="characters" spellcheck="false" inputmode="numeric"/>
    <button class="btn btn-accent" id="lookupBtn">Continue →</button>
    <div class="inline-err" id="idErr"></div>
    <div class="divider">or</div>
    <button id="feedbackBtn">💬 Share Meal Feedback</button>
    <div style="margin-top:10px;text-align:center">
      <a href="https://script.google.com/macros/s/AKfycbyIu6RRVDDCzruAUY2HCfT2AKMKkphyVbgy7a6a82RO_lT6lckqKYdelwKBLfl-_pQiGg/exec?page=admin" target="_blank" style="font-size:.72rem;color:var(--muted);text-decoration:none;">Admin Panel</a>
    </div>
  </div>

  <!-- Screen 2: Meal Choice -->
  <div class="screen" id="scr-choice">
    <h2>Choose Your Meal</h2>

    <!-- Regular employee -->
    <div id="regularFlow">
      <div class="emp-banner">
        <div class="icon">👤</div>
        <div>
          <div class="name" id="bannerName"></div>
          <div class="dept" id="bannerDept"></div>
        </div>
      </div>
      <div class="meal-choices">
        <button class="meal-opt" id="opt-single" onclick="selectOpt('single')">
          <div class="oi">🍽</div>
          <div class="ot">1 Meal</div>
          <div class="op single-color">$2.50</div>
          <div class="os">Single ticket</div>
        </button>
        <button class="meal-opt" id="opt-bundle" onclick="selectOpt('bundle')">
          <div class="oi">🎟</div>
          <div class="ot">5 Meals</div>
          <div class="op bundle-color">$9.00</div>
          <div class="save-badge">Save $3.50</div>
          <div class="os">Use over 5 check-ins</div>
        </button>
      </div>
      <button class="btn btn-accent" id="confirmBtn" disabled onclick="doCheckin()">Confirm Check-In</button>
    </div>

    <!-- Free meal employee -->
    <div id="freeFlow" style="display:none">
      <div class="free-banner">
        <div class="fi">🎉</div>
        <div class="ft" id="freeName"></div>
        <div class="fs">20+ years of service — your meal is free!</div>
      </div>
      <button class="btn btn-accent" id="freeBtn" onclick="doCheckin()">Check In — Free Meal ✨</button>
    </div>

    <button class="back-btn" onclick="goBack()">← Change ID</button>
  </div>

  <!-- Screen 3: Confirmation -->
  <div class="screen" id="scr-done">
    <div class="result" id="resultBox">
      <div class="ri" id="rI"></div>
      <div class="rn" id="rN"></div>
      <div class="rd" id="rD"></div>
      <div class="rm" id="rM"></div>
      <div class="rp" id="rP"></div>
      <div class="credits" id="rC" style="display:none"></div>
    </div>
    <button class="btn btn-ghost" onclick="resetAll()">Next Employee</button>
  </div>

</div>



<script>
const SCRIPT_URL   = "https://script.google.com/macros/s/AKfycbyIu6RRVDDCzruAUY2HCfT2AKMKkphyVbgy7a6a82RO_lT6lckqKYdelwKBLfl-_pQiGg/exec";
const FEEDBACK_URL = SCRIPT_URL + "?page=feedback";

let emp     = null; // current employee data from lookup
let selOpt  = null; // 'single' | 'bundle' | 'free'

// Clock
setInterval(() => {
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}, 1000);
document.getElementById('clk').textContent =
  new Date().toLocaleTimeString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});

// Steps
function setStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('s'+i).className = 'step'+(i<n?' done':i===n?' active':'');
    if(i<3) document.getElementById('l'+i).className = 'step-line'+(i<n?' done':'');
  });
}

function showScr(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-'+name).classList.add('active');
  setStep({id:1,choice:2,done:3}[name]);
}

// Step 1 — Lookup
async function lookup() {
  const id = document.getElementById('empId').value.trim().toUpperCase();
  if (!id) return;
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Looking up…';
  document.getElementById('idErr').style.display = 'none';
  try {
    const data = await jsonp({ action:'lookup', employee_id:id });
    if (data.ok) {
      emp = data; selOpt = null;
      if (data.is_free) {
        document.getElementById('freeFlow').style.display = 'block';
        document.getElementById('regularFlow').style.display = 'none';
        document.getElementById('freeName').textContent = data.employee_name;
        selOpt = 'free';
      } else {
        document.getElementById('regularFlow').style.display = 'block';
        document.getElementById('freeFlow').style.display = 'none';
        document.getElementById('bannerName').textContent = data.employee_name;
        document.getElementById('bannerDept').textContent = data.department || 'A.G. Rhodes Atlanta';
        document.getElementById('opt-single').className = 'meal-opt';
        document.getElementById('opt-bundle').className = 'meal-opt';
        document.getElementById('confirmBtn').disabled = true;
      }
      showScr('choice');
    } else {
      const el = document.getElementById('idErr');
      el.textContent = data.message; el.style.display = 'block';
    }
  } catch(e) {
    const el = document.getElementById('idErr');
    el.textContent = 'Connection error. Please try again.'; el.style.display = 'block';
  }
  btn.disabled = false; btn.textContent = 'Continue →';
}

// Step 2 — Select option
function selectOpt(opt) {
  selOpt = opt;
  document.getElementById('opt-single').className = 'meal-opt' + (opt==='single' ? ' sel-single' : '');
  document.getElementById('opt-bundle').className = 'meal-opt' + (opt==='bundle' ? ' sel-bundle' : '');
  document.getElementById('confirmBtn').disabled = false;
}

function goBack() {
  emp = null; selOpt = null;
  document.getElementById('empId').value = '';
  document.getElementById('idErr').style.display = 'none';
  showScr('id');
}

// Step 3 — Confirm
async function doCheckin() {
  const isFree = selOpt === 'free';
  const btn    = isFree ? document.getElementById('freeBtn') : document.getElementById('confirmBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Checking in…';
  try {
    const data = await jsonp({ action:'checkin', employee_id: emp.employee_id, meal_option: selOpt });
    if (data.ok) {
      showDone(data);
    } else {
      btn.disabled = false;
      btn.textContent = isFree ? 'Check In — Free Meal ✨' : 'Confirm Check-In';
      const el = document.getElementById('idErr');
      el.textContent = data.message; el.style.display = 'block';
      showScr('id');
    }
  } catch(e) {
    btn.disabled = false; btn.textContent = 'Confirm Check-In';
  }
}

function showDone(d) {
  showScr('done');
  const isBundle = d.meal_option === 'bundle';
  const isFree   = d.is_free;
  const box      = document.getElementById('resultBox');
  box.className  = 'result ' + (isFree ? 'res-free' : isBundle ? 'res-bundle' : 'res-success');
  document.getElementById('rI').textContent = isFree ? '🎉' : isBundle ? '🎟' : '✅';
  document.getElementById('rN').textContent = d.employee_name;
  document.getElementById('rD').textContent = d.department || '';
  document.getElementById('rM').textContent = 'Logged at ' + d.time + ' on ' + d.date;
  const rp = document.getElementById('rP');
  rp.className = 'rp ' + (isFree ? 'rp-gold' : isBundle ? 'rp-blue' : 'rp-green');
  rp.textContent = isFree ? '✨ FREE MEAL' : isBundle ? '🎟 5-Meal Bundle — $9.00' : '1 Meal — $2.50';
  const rc = document.getElementById('rC');
  if (isBundle && d.bundle_remaining > 0) {
    rc.style.display = 'inline-block';
    rc.textContent   = d.bundle_remaining + ' meal credit(s) remaining today';
  } else { rc.style.display = 'none'; }
}

function resetAll() {
  emp = null; selOpt = null;
  document.getElementById('empId').value = '';
  document.getElementById('idErr').style.display = 'none';
  showScr('id');
}

// JSONP helper — bypasses CORS restriction on Apps Script
function jsonp(params) {
  return new Promise(function(resolve, reject) {
    var cbName = 'cb_' + Date.now();
    var script  = document.createElement('script');
    var timeout = setTimeout(function() {
      cleanup(); reject(new Error('Request timed out'));
    }, 15000);
    function cleanup() {
      clearTimeout(timeout);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = function(data) { cleanup(); resolve(data); };
    var qs = Object.keys(params).map(function(k) {
      return encodeURIComponent(k) + '=' + encodeURIComponent(params[k]);
    }).join('&');
    script.src = SCRIPT_URL + '?' + qs + '&callback=' + cbName;
    script.onerror = function() { cleanup(); reject(new Error('Network error')); };
    document.head.appendChild(script);
  });
}

document.getElementById('lookupBtn').addEventListener('click', lookup);
document.getElementById('empId').addEventListener('keydown', e => { if(e.key==='Enter') lookup(); });
document.getElementById('feedbackBtn').addEventListener('click', function() {
  window.location.href = 'https://script.google.com/macros/s/AKfycbyIu6RRVDDCzruAUY2HCfT2AKMKkphyVbgy7a6a82RO_lT6lckqKYdelwKBLfl-_pQiGg/exec?page=feedback';
});
</script>
</body>
</html>
