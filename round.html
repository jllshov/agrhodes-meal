<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>A.G. Rhodes — Zone Round</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EAEEF2;
  --surface: #EEF1F5;
  --orange: #F5A623;
  --orange-light: #FFF3DC;
  --black: #1A1A1A;
  --gray: #6B7280;
  --gray-light: #9CA3AF;
  --green: #22C55E;
  --red: #EF4444;
  --amber: #F59E0B;
  --shadow-out: 6px 6px 14px #C8CDD5, -6px -6px 14px #FFFFFF;
  --shadow-in: inset 4px 4px 10px #C8CDD5, inset -4px -4px 10px #FFFFFF;
  --shadow-card: 8px 8px 20px #C5CAD1, -8px -8px 20px #FFFFFF;
  --r: 20px;
  --r-sm: 12px;
  --r-pill: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); }
body { min-height: 100vh; padding-bottom: 100px; }

.wrap { max-width: 480px; margin: 0 auto; padding: 20px 16px; }

/* ── Header ── */
.rr-header {
  background: var(--surface); border-radius: 24px; box-shadow: var(--shadow-card);
  padding: 22px 20px; text-align: center; margin-bottom: 18px;
}
.rr-icon { font-size: 30px; margin-bottom: 6px; }
.rr-name { font-size: 21px; font-weight: 800; letter-spacing: -.02em; }
.rr-meta { font-size: 12.5px; color: var(--gray); margin-top: 3px; }

/* ── Buttons ── */
.neu-btn {
  padding: 12px 20px; border-radius: var(--r-pill); border: none; cursor: pointer;
  font-family: inherit; font-size: 14px; font-weight: 600;
  background: var(--surface); box-shadow: var(--shadow-out);
  color: var(--black); transition: all .15s;
}
.neu-btn:active { box-shadow: var(--shadow-in); }
.neu-btn.primary { background: var(--orange); color: white;
  box-shadow: 4px 4px 12px rgba(245,166,35,.5), -2px -2px 8px rgba(245,166,35,.2); }
.neu-btn.primary:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,.15); }
.neu-btn.block { width: 100%; }
.neu-btn.ghost { background: transparent; box-shadow: none; color: var(--gray); font-size: 13px; }

/* ── Landing choice cards ── */
.choice-card {
  background: var(--surface); border-radius: 22px; box-shadow: var(--shadow-card);
  padding: 22px 20px; display: flex; align-items: center; gap: 16px;
  cursor: pointer; margin-bottom: 14px; transition: transform .15s;
}
.choice-card:active { transform: scale(.98); }
.choice-icon {
  width: 54px; height: 54px; border-radius: 16px; background: var(--orange-light);
  display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0;
}
.choice-title { font-size: 15.5px; font-weight: 800; }
.choice-sub { font-size: 12px; color: var(--gray); margin-top: 2px; }
.choice-arrow { margin-left: auto; font-size: 18px; color: var(--gray-light); }

/* ── Cards / sections ── */
.card { background: var(--surface); border-radius: 22px; box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 14px; }
.section-title {
  font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em;
  color: var(--gray); margin-bottom: 12px; display: flex; align-items: center; gap: 8px;
}
.section-count { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--bg); padding: 2px 8px; border-radius: 999px; box-shadow: var(--shadow-out); }

/* ── Checklist item ── */
.check-row { margin-bottom: 16px; }
.check-row:last-child { margin-bottom: 0; }
.check-label { font-size: 13.5px; font-weight: 700; margin-bottom: 8px; }
.check-btns { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.check-btn {
  padding: 11px 8px; border-radius: 12px; border: none; cursor: pointer;
  font-family: inherit; font-size: 12px; font-weight: 700;
  background: var(--bg); box-shadow: var(--shadow-out); color: var(--gray); transition: all .15s;
}
.check-btn.sel-pass { background: rgba(34,197,94,.15); color: #16A34A; box-shadow: 3px 3px 8px rgba(34,197,94,.25); }
.check-btn.sel-fail { background: rgba(239,68,68,.15); color: #DC2626; box-shadow: 3px 3px 8px rgba(239,68,68,.25); }
.check-btn.sel-na   { background: rgba(107,114,128,.15); color: var(--gray); box-shadow: var(--shadow-in); }

/* ── Progress bar (sticky) ── */
.progress-bar-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface);
  box-shadow: 0 -6px 20px rgba(0,0,0,.08); padding: 14px 16px; z-index: 50;
}
.progress-bar-inner { max-width: 480px; margin: 0 auto; display: flex; align-items: center; gap: 12px; }
.progress-track { flex: 1; height: 8px; border-radius: 999px; background: var(--bg); box-shadow: var(--shadow-in); overflow: hidden; }
.progress-fill { height: 100%; background: var(--orange); border-radius: 999px; transition: width .3s ease; width: 0%; }
.progress-label { font-family: 'DM Mono', monospace; font-size: 11.5px; color: var(--gray); flex-shrink: 0; }

/* ── Issue block ── */
.issue-card { background: var(--bg); border-radius: 16px; padding: 14px; box-shadow: var(--shadow-out); margin-bottom: 10px; }
.issue-card-title { font-size: 12.5px; font-weight: 700; margin-bottom: 8px; display: flex; align-items: center; gap: 6px; }
.issue-card textarea, .issue-card input, .issue-card select {
  width: 100%; padding: 10px 12px; border: none; border-radius: 10px;
  background: var(--surface); box-shadow: var(--shadow-in);
  font-family: inherit; font-size: 12.5px; color: var(--black); margin-bottom: 8px; resize: vertical;
}
.priority-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 6px; }
.priority-btn {
  padding: 8px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit;
  font-size: 11.5px; font-weight: 700; background: var(--surface); box-shadow: var(--shadow-out); color: var(--gray);
}
.priority-btn.sel-High { background: rgba(239,68,68,.15); color: var(--red); }
.priority-btn.sel-Medium { background: rgba(245,158,11,.15); color: var(--amber); }
.priority-btn.sel-Low { background: rgba(34,197,94,.15); color: var(--green); }
.issue-remove { background: none; border: none; color: var(--gray-light); font-size: 13px; cursor: pointer; margin-left: auto; }

/* ── Asset view (read only) ── */
.asset-item { display: flex; align-items: center; gap: 12px; background: var(--bg); border-radius: 16px; padding: 13px 15px; box-shadow: var(--shadow-out); margin-bottom: 9px; }
.asset-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--orange-light); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
.asset-info { flex: 1; min-width: 0; }
.asset-name { font-size: 13px; font-weight: 700; }
.asset-meta { font-size: 11px; color: var(--gray); margin-top: 1px; }
.asset-condition { font-size: 10px; font-weight: 700; padding: 4px 10px; border-radius: 999px; flex-shrink: 0; }

/* ── Success ── */
.success-wrap { text-align: center; padding: 40px 20px; }
.success-icon { font-size: 56px; margin-bottom: 14px; }
.success-title { font-size: 20px; font-weight: 800; }
.success-sub { font-size: 13px; color: var(--gray); margin-top: 6px; }

.center-msg { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 13.5px; }

.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--gray); background: none; border: none; cursor: pointer; font-family: inherit; margin-bottom: 14px; }

/* ── In-page toast (replaces alert() — blocked in many in-app browsers) ── */
.toast {
  position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 300;
  max-width: 440px; width: calc(100% - 32px); background: var(--black); color: white;
  padding: 14px 18px; border-radius: 14px; font-size: 13px; font-weight: 600;
  box-shadow: 0 10px 30px rgba(0,0,0,.25); display: flex; align-items: center; gap: 10px;
}
.toast.error { background: #DC2626; }
.toast.success { background: #16A34A; }
.toast-close { margin-left: auto; background: none; border: none; color: white; font-size: 16px; cursor: pointer; opacity: .8; flex-shrink:0; }

/* ── In-page confirm modal (replaces confirm() — also blocked in many in-app browsers) ── */
.confirm-overlay {
  display: none; position: fixed; inset: 0; background: rgba(0,0,0,.4); z-index: 400;
  align-items: center; justify-content: center; padding: 20px;
}
.confirm-overlay.show { display: flex; }
.confirm-box { background: var(--surface); border-radius: 20px; padding: 22px; max-width: 360px; width: 100%; box-shadow: var(--shadow-card); }
.confirm-msg { font-size: 14px; font-weight: 600; margin-bottom: 18px; line-height: 1.4; }
.confirm-actions { display: flex; gap: 10px; }

/* ── Inline name field ── */
.name-field-card { padding: 14px 18px; }
.name-field-card input { width: 100%; padding: 11px 12px; border: none; border-radius: 12px; background: var(--bg); box-shadow: var(--shadow-in); font-family: inherit; font-size: 13.5px; color: var(--black); }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="center-msg" id="loadingMsg">Loading…</div>
</div>

<div class="confirm-overlay" id="confirmOverlay">
  <div class="confirm-box">
    <div class="confirm-msg" id="confirmMsg"></div>
    <div class="confirm-actions">
      <button class="neu-btn" style="flex:1;" onclick="closeConfirmModal(false)">Cancel</button>
      <button class="neu-btn primary" style="flex:1;" onclick="closeConfirmModal(true)">Continue</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://gtbiatetqyuxwuehwilr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YmlhdGV0cXl1eHd1ZWh3aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTgzMjcsImV4cCI6MjA5NTM5NDMyN30.C9nsE4uMqLt8DZTWXZVLToHWMG3ApKyb702hDQSIr34';
const FACILITY_ID   = '30f74349-3ab8-483b-a587-f372c0fbd413';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');

var currentLoc = null;
var roundValues = {};   // key -> 'pass'|'fail'|'yes'|'no'|'n/a'
var issueDrafts = {};   // key -> { description, priority } for items answered negatively
var extraIssues = [];   // manually added issues not tied to a checklist item

// ── Checklist definition — field names match exactly what the dashboard reads ──
var ROOM_SECTIONS = [
  { title:'Resident Status', dept:'Nursing', type:'yesno', items:[
    { key:'resident_contacted', label:'Resident Contacted' },
    { key:'satisfaction', label:'Satisfied With Care' },
    { key:'no_concerns', label:'No Concerns' }
  ]},
  { title:'Safety', dept:'Safety', type:'passfail', items:[
    { key:'call_light', label:'Call Light Working & Within Reach' },
    { key:'bed_low_locked', label:'Bed Low & Locked' },
    { key:'room_clutter', label:'Room Free of Clutter' }
  ]},
  { title:'Cleanliness', dept:'Housekeeping', type:'passfail', items:[
    { key:'floor_clean', label:'Floor Clean' },
    { key:'bathroom_clean', label:'Bathroom Clean' },
    { key:'trash_removed', label:'Trash Removed' }
  ]},
  { title:'Environment', dept:'Housekeeping', type:'passfail', items:[
    { key:'curtains_clean', label:'Curtains Clean' },
    { key:'odor_free', label:'No Odors' },
    { key:'lighting', label:'Lighting Adequate' }
  ]},
  { title:'Equipment', dept:'Maintenance', type:'passfail', items:[
    { key:'furniture_intact', label:'Furniture Intact' },
    { key:'equipment_functioning', label:'Equipment Functioning' },
    { key:'no_maintenance', label:'No Maintenance Issues' }
  ]}
];

// Generic EOC area checklist — a reasonable default since no fixed schema exists yet
// for eoc_scores. Stored as JSON in zone_rounds.eoc_scores. Adjust freely later.
var EOC_SECTIONS = [
  { title:'Environment of Care', dept:'Nursing', type:'passfail', items:[
    { key:'cleanliness', label:'Area Clean & Organized' },
    { key:'supplies_stocked', label:'Supplies Adequately Stocked' },
    { key:'signage_visible', label:'Required Signage Visible' },
    { key:'equipment_functioning', label:'Equipment Functioning' },
    { key:'safety_compliant', label:'Safety Requirements Met' },
    { key:'documentation_current', label:'Documentation Current' }
  ]}
];

var ASSET_ICONS = {
  'TV':'📺','Bed':'🛏','Wheelchair':'🦽','Recliner':'🛋','Dresser':'🗄',
  'Nightstand':'🪑','Overbed Table':'🍽','Air Mattress':'💨','Lift':'🏗','Other':'📦'
};

// ── In-page dialog replacements ──
// Native alert()/confirm()/prompt() are silently blocked or no-op in many in-app
// browsers (Instagram, Facebook, TikTok, some scanner apps), which is why "Review"
// could appear to do nothing. Everything below stays inside the page instead.
function showToast(msg, type) {
  var existing = document.getElementById('appToast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.id = 'appToast';
  t.className = 'toast' + (type ? ' ' + type : '');
  t.innerHTML = '<span>' + msg + '</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>';
  document.body.appendChild(t);
  if (type !== 'error') setTimeout(function(){ if (t && t.parentElement) t.remove(); }, 4000);
}

var _confirmResolve = null;
function showConfirm(msg) {
  return new Promise(function(resolve){
    _confirmResolve = resolve;
    document.getElementById('confirmMsg').textContent = msg;
    document.getElementById('confirmOverlay').classList.add('show');
  });
}
function closeConfirmModal(result) {
  document.getElementById('confirmOverlay').classList.remove('show');
  if (_confirmResolve) { _confirmResolve(result); _confirmResolve = null; }
}

function getStaffName() {
  var input = document.getElementById('staffNameInput');
  return input ? input.value.trim() : (localStorage.getItem('agrhodes_round_staff') || '').trim();
}
function nameFieldHTML() {
  var saved = localStorage.getItem('agrhodes_round_staff') || '';
  return '<div class="card name-field-card">' +
    '<div class="section-title" style="margin-bottom:8px;">Your Name</div>' +
    '<input type="text" id="staffNameInput" placeholder="Enter your name" value="' + saved.replace(/"/g,'&quot;') + '" ' +
      'oninput="localStorage.setItem(\'agrhodes_round_staff\', this.value)">' +
  '</div>';
}

function getQrIdentifier() {
  var hash = window.location.hash.slice(1); // "round=agrhodes-..."
  var params = new URLSearchParams(hash);
  return params.get('round');
}

async function init() {
  var qrId = getQrIdentifier();
  if (!qrId) {
    app.innerHTML = '<div class="center-msg">⚠ No location code found in this link.<br>Please scan the QR code again.</div>';
    return;
  }
  var { data: loc, error } = await sb.from('room_qr_codes').select('*')
    .eq('facility_id', FACILITY_ID).eq('qr_identifier', qrId).eq('is_active', true).maybeSingle();

  if (error) {
    app.innerHTML = '<div class="center-msg">⚠ Couldn\'t load this location.<br><span style="font-family:\'DM Mono\',monospace;font-size:11px;">'+error.message+'</span></div>';
    return;
  }
  if (!loc) {
    app.innerHTML = '<div class="center-msg">⚠ This location wasn\'t found or is no longer active.<br>Ask your administrator to check the QR code.</div>';
    return;
  }
  currentLoc = loc;
  renderLanding();
}

function locSubtitle(loc) {
  return loc.unit || loc.eoc_department || '';
}

function renderLanding() {
  var loc = currentLoc;
  var isRoom = loc.location_type === 'room';
  app.innerHTML =
    '<div class="rr-header">' +
      '<div class="rr-icon">' + (isRoom ? '🚪' : '📋') + '</div>' +
      '<div class="rr-name">' + loc.display_name + '</div>' +
      '<div class="rr-meta">' + locSubtitle(loc) + '</div>' +
    '</div>' +
    '<div class="choice-card" onclick="startRound()">' +
      '<div class="choice-icon">📋</div>' +
      '<div><div class="choice-title">Complete Zone Round</div>' +
        '<div class="choice-sub">Run the checklist and log any issues</div></div>' +
      '<div class="choice-arrow">›</div>' +
    '</div>' +
    '<div class="choice-card" onclick="reportIssueForm()">' +
      '<div class="choice-icon">🛠</div>' +
      '<div><div class="choice-title">Report Something That Needs Fixing</div>' +
        '<div class="choice-sub">Quick issue report — no checklist required</div></div>' +
      '<div class="choice-arrow">›</div>' +
    '</div>' +
    '<div style="text-align:center;margin-top:6px;">' +
      '<button class="neu-btn ghost" onclick="viewAssets()">View ' + (isRoom ? 'Room' : 'Area') + ' Assets →</button>' +
    '</div>';
}

function backToLanding() {
  roundValues = {}; issueDrafts = {}; extraIssues = [];
  renderLanding();
}

/* ── Checklist flow ── */
function startRound() {
  roundValues = {}; issueDrafts = {};
  renderChecklist();
}

function getSections() {
  return currentLoc.location_type === 'room' ? ROOM_SECTIONS : EOC_SECTIONS;
}
function totalItems() {
  return getSections().reduce(function(sum, s){ return sum + s.items.length; }, 0);
}
function answeredCount() {
  return Object.keys(roundValues).length;
}

function renderChecklist() {
  var sections = getSections();
  var html = '<button class="back-link" onclick="backToLanding()">‹ Back to menu</button>';
  html += '<div class="rr-header" style="padding:16px 18px;"><div class="rr-name" style="font-size:16px;">' + currentLoc.display_name + '</div>' +
    '<div class="rr-meta">' + locSubtitle(currentLoc) + '</div></div>';
  html += nameFieldHTML();

  sections.forEach(function(section, si) {
    html += '<div class="card"><div class="section-title"><span>' + section.title + '</span></div>';
    section.items.forEach(function(item) {
      var val = roundValues[item.key];
      var posLabel = section.type === 'yesno' ? 'Yes' : 'Pass';
      var negLabel = section.type === 'yesno' ? 'No' : 'Fail';
      var posVal = section.type === 'yesno' ? 'yes' : 'pass';
      var negVal = section.type === 'yesno' ? 'no' : 'fail';
      html +=
        '<div class="check-row">' +
          '<div class="check-label">' + item.label + '</div>' +
          '<div class="check-btns">' +
            '<button class="check-btn' + (val===posVal?' sel-pass':'') + '" onclick="setCheckValue(\''+item.key+'\',\''+posVal+'\',\''+section.dept+'\',\''+item.label.replace(/'/g,"\\'")+'\')">✓ ' + posLabel + '</button>' +
            '<button class="check-btn' + (val===negVal?' sel-fail':'') + '" onclick="setCheckValue(\''+item.key+'\',\''+negVal+'\',\''+section.dept+'\',\''+item.label.replace(/'/g,"\\'")+'\')">✕ ' + negLabel + '</button>' +
            '<button class="check-btn' + (val==='n/a'?' sel-na':'') + '" onclick="setCheckValue(\''+item.key+'\',\'n/a\',\''+section.dept+'\',\''+item.label.replace(/'/g,"\\'")+'\')">N/A</button>' +
          '</div>' +
          '<div id="issue-slot-' + item.key + '"></div>' +
        '</div>';
    });
    html += '</div>';
  });

  html += '<div class="card" id="extraIssuesCard"><div class="section-title"><span>Additional Issues</span><span class="section-count" id="extraIssueCount">' + extraIssues.length + '</span></div>' +
    '<div id="extraIssuesList"></div>' +
    '<button class="neu-btn block" onclick="addExtraIssue()" style="margin-top:4px;">+ Add an Issue Not Listed Above</button>' +
  '</div>';

  html += '<div style="height:20px;"></div>';

  app.innerHTML = html;
  Object.keys(issueDrafts).forEach(function(k){ renderIssueSlot(k); });
  renderExtraIssues();
  updateProgressBar();
}

function setCheckValue(key, val, dept, label) {
  roundValues[key] = val;
  var isNegative = (val === 'fail' || val === 'no');
  if (isNegative && !issueDrafts[key]) {
    issueDrafts[key] = { dept: dept, description: label + ' needs attention', priority: 'Medium' };
  } else if (!isNegative) {
    delete issueDrafts[key];
  }
  renderChecklist();
}

function renderIssueSlot(key) {
  var slot = document.getElementById('issue-slot-' + key);
  if (!slot) return;
  var draft = issueDrafts[key];
  if (!draft) { slot.innerHTML = ''; return; }
  slot.innerHTML =
    '<div class="issue-card" style="margin-top:10px;">' +
      '<div class="issue-card-title">⚠ Issue detected</div>' +
      '<textarea rows="2" onchange="updateIssueDraft(\''+key+'\',\'description\',this.value)">' + draft.description + '</textarea>' +
      '<div class="priority-row">' +
        '<button class="priority-btn' + (draft.priority==='Low'?' sel-Low':'') + '" onclick="updateIssueDraft(\''+key+'\',\'priority\',\'Low\')">Low</button>' +
        '<button class="priority-btn' + (draft.priority==='Medium'?' sel-Medium':'') + '" onclick="updateIssueDraft(\''+key+'\',\'priority\',\'Medium\')">Medium</button>' +
        '<button class="priority-btn' + (draft.priority==='High'?' sel-High':'') + '" onclick="updateIssueDraft(\''+key+'\',\'priority\',\'High\')">High</button>' +
      '</div>' +
    '</div>';
}

function updateIssueDraft(key, field, value) {
  if (!issueDrafts[key]) return;
  issueDrafts[key][field] = value;
  renderIssueSlot(key);
}

function addExtraIssue() {
  extraIssues.push({ dept:'Other', description:'', priority:'Medium' });
  renderExtraIssues();
}
function removeExtraIssue(idx) {
  extraIssues.splice(idx,1);
  renderExtraIssues();
}
function updateExtraIssue(idx, field, value) {
  extraIssues[idx][field] = value;
  renderExtraIssues();
}
function renderExtraIssues() {
  var list = document.getElementById('extraIssuesList');
  var countEl = document.getElementById('extraIssueCount');
  if (!list) return;
  countEl.textContent = extraIssues.length;
  var depts = ['Nursing','Housekeeping','Maintenance','Dietary','Social Services','Activities','Infection Control','Safety','Other'];
  list.innerHTML = extraIssues.map(function(iss, idx){
    return '<div class="issue-card">' +
      '<div class="issue-card-title">Issue #' + (idx+1) + '<button class="issue-remove" onclick="removeExtraIssue(' + idx + ')">✕ remove</button></div>' +
      '<select onchange="updateExtraIssue(' + idx + ',\'dept\',this.value)">' +
        depts.map(function(d){ return '<option value="'+d+'"'+(iss.dept===d?' selected':'')+'>'+d+'</option>'; }).join('') +
      '</select>' +
      '<textarea rows="2" placeholder="Describe the issue…" onchange="updateExtraIssue(' + idx + ',\'description\',this.value)">' + iss.description + '</textarea>' +
      '<div class="priority-row">' +
        '<button class="priority-btn' + (iss.priority==='Low'?' sel-Low':'') + '" onclick="updateExtraIssue(' + idx + ',\'priority\',\'Low\')">Low</button>' +
        '<button class="priority-btn' + (iss.priority==='Medium'?' sel-Medium':'') + '" onclick="updateExtraIssue(' + idx + ',\'priority\',\'Medium\')">Medium</button>' +
        '<button class="priority-btn' + (iss.priority==='High'?' sel-High':'') + '" onclick="updateExtraIssue(' + idx + ',\'priority\',\'High\')">High</button>' +
      '</div>' +
    '</div>';
  }).join('');
}

function updateProgressBar() {
  var existing = document.getElementById('progressBarWrap');
  if (existing) existing.remove();
  var total = totalItems();
  var done = answeredCount();
  var pct = total ? Math.round((done/total)*100) : 0;

  var bar = document.createElement('div');
  bar.id = 'progressBarWrap';
  bar.className = 'progress-bar-wrap';
  bar.innerHTML =
    '<div class="progress-bar-inner">' +
      '<div class="progress-track"><div class="progress-fill" style="width:' + pct + '%;"></div></div>' +
      '<div class="progress-label">' + done + '/' + total + '</div>' +
      '<button class="neu-btn primary" style="padding:11px 18px;font-size:13px;" onclick="reviewAndSubmit()">Review →</button>' +
    '</div>';
  document.body.appendChild(bar);
}

async function reviewAndSubmit() {
  var total = totalItems();
  var done = answeredCount();
  if (!getStaffName()) {
    showToast('Please enter your name at the top of the page before submitting.', 'error');
    var input = document.getElementById('staffNameInput');
    if (input) input.focus();
    return;
  }
  if (done < total) {
    var cont = await showConfirm((total-done) + ' item(s) not yet answered. Continue anyway? Unanswered items will be left blank.');
    if (!cont) return;
  }
  submitRound();
}

async function submitRound() {
  var staffName = getStaffName();
  if (!staffName) {
    showToast('Please enter your name at the top of the page before submitting.', 'error');
    return;
  }
  localStorage.setItem('agrhodes_round_staff', staffName);

  var wrap = document.getElementById('progressBarWrap');
  if (wrap) { var btn = wrap.querySelector('button'); if (btn) btn.textContent = 'Saving…'; }

  var loc = currentLoc;
  var isRoom = loc.location_type === 'room';
  var roundRow = {
    facility_id: FACILITY_ID,
    qr_identifier: loc.qr_identifier,
    round_type: isRoom ? 'room' : 'eoc',
    rounded_by: staffName,
    rounded_at: new Date().toISOString()
  };

  if (isRoom) {
    Object.keys(roundValues).forEach(function(k){ roundRow[k] = roundValues[k]; });
  } else {
    var passCount = 0, totalScored = 0;
    var scores = {};
    Object.keys(roundValues).forEach(function(k){
      scores[k] = roundValues[k];
      if (roundValues[k] !== 'n/a') { totalScored++; if (roundValues[k] === 'pass') passCount++; }
    });
    roundRow.eoc_scores = JSON.stringify(scores);
    roundRow.eoc_compliance_pct = totalScored ? Math.round((passCount/totalScored)*100) : null;
  }

  var { data: insertedRound, error: roundErr } = await sb.from('zone_rounds').insert(roundRow).select().single();
  if (roundErr) {
    showToast('Error saving round: ' + roundErr.message, 'error');
    if (wrap) { var btn2 = wrap.querySelector('button'); if (btn2) btn2.textContent = 'Review →'; }
    return;
  }

  // Build the full list of issues: auto-flagged from failed items + manually added
  var allIssues = [];
  Object.keys(issueDrafts).forEach(function(key){
    var d = issueDrafts[key];
    if (d.description && d.description.trim()) {
      allIssues.push({
        facility_id: FACILITY_ID, round_id: insertedRound.id,
        room_number: loc.room_number || null, eoc_section: loc.eoc_section || null,
        issue_type: d.dept, issue_description: d.description, priority: d.priority,
        status: 'Open', created_at: new Date().toISOString()
      });
    }
  });
  extraIssues.forEach(function(iss){
    if (iss.description && iss.description.trim()) {
      allIssues.push({
        facility_id: FACILITY_ID, round_id: insertedRound.id,
        room_number: loc.room_number || null, eoc_section: loc.eoc_section || null,
        issue_type: iss.dept, issue_description: iss.description, priority: iss.priority,
        status: 'Open', created_at: new Date().toISOString()
      });
    }
  });

  if (allIssues.length) {
    var { error: issueErr } = await sb.from('zone_issues').insert(allIssues);
    if (issueErr) {
      showToast('Round was saved, but there was an error logging issues: ' + issueErr.message, 'error');
    }
  }

  var barEl = document.getElementById('progressBarWrap');
  if (barEl) barEl.remove();
  renderSuccess(allIssues.length);
}

function renderSuccess(issueCount) {
  app.innerHTML =
    '<div class="card success-wrap">' +
      '<div class="success-icon">✅</div>' +
      '<div class="success-title">Round Complete</div>' +
      '<div class="success-sub">' + currentLoc.display_name + ' has been logged.' +
        (issueCount ? '<br>' + issueCount + ' issue' + (issueCount>1?'s':'') + ' reported.' : '<br>No issues reported.') +
      '</div>' +
      '<button class="neu-btn primary block" style="margin-top:20px;" onclick="backToLanding()">Back to Menu</button>' +
    '</div>';
}

/* ── Quick issue report (no checklist required) ── */
var quickIssue = { dept:'Maintenance', description:'', priority:'Medium' };
var ISSUE_DEPTS = ['Nursing','Housekeeping','Maintenance','Dietary','Social Services','Activities','Infection Control','Safety','Other'];

function reportIssueForm() {
  quickIssue = { dept:'Maintenance', description:'', priority:'Medium' };
  renderReportIssueForm();
}

function renderReportIssueForm() {
  var loc = currentLoc;
  app.innerHTML =
    '<button class="back-link" onclick="backToLanding()">‹ Back to menu</button>' +
    '<div class="rr-header" style="padding:16px 18px;">' +
      '<div class="rr-name" style="font-size:16px;">🛠 Report Something</div>' +
      '<div class="rr-meta">' + loc.display_name + ' · ' + locSubtitle(loc) + '</div>' +
    '</div>' +
    nameFieldHTML() +
    '<div class="card">' +
      '<div class="section-title">What department does this belong to?</div>' +
      '<select id="qi-dept" onchange="quickIssue.dept=this.value">' +
        ISSUE_DEPTS.map(function(d){ return '<option value="'+d+'"'+(quickIssue.dept===d?' selected':'')+'>'+d+'</option>'; }).join('') +
      '</select>' +
      '<div class="section-title" style="margin-top:14px;">What needs fixing?</div>' +
      '<textarea id="qi-desc" rows="4" placeholder="Describe what you noticed…" oninput="quickIssue.description=this.value"></textarea>' +
      '<div class="section-title" style="margin-top:14px;">Priority</div>' +
      '<div class="priority-row">' +
        '<button class="priority-btn' + (quickIssue.priority==='Low'?' sel-Low':'') + '" onclick="setQuickPriority(\'Low\')">Low</button>' +
        '<button class="priority-btn' + (quickIssue.priority==='Medium'?' sel-Medium':'') + '" onclick="setQuickPriority(\'Medium\')">Medium</button>' +
        '<button class="priority-btn' + (quickIssue.priority==='High'?' sel-High':'') + '" onclick="setQuickPriority(\'High\')">High</button>' +
      '</div>' +
    '</div>' +
    '<button class="neu-btn primary block" id="qi-submit-btn" onclick="submitQuickIssue()">🛠 Submit Report</button>';
}

function setQuickPriority(p) {
  quickIssue.priority = p;
  renderReportIssueForm();
}

async function submitQuickIssue() {
  if (!quickIssue.description || !quickIssue.description.trim()) {
    showToast('Please describe what needs fixing.', 'error');
    return;
  }
  var staffName = getStaffName();
  if (!staffName) {
    showToast('Please enter your name at the top of the page before submitting.', 'error');
    var input = document.getElementById('staffNameInput');
    if (input) input.focus();
    return;
  }
  localStorage.setItem('agrhodes_round_staff', staffName);

  var btn = document.getElementById('qi-submit-btn');
  if (btn) { btn.textContent = 'Submitting…'; btn.disabled = true; }

  var loc = currentLoc;
  var { error } = await sb.from('zone_issues').insert({
    facility_id: FACILITY_ID,
    round_id: null,
    room_number: loc.room_number || null,
    eoc_section: loc.eoc_section || null,
    issue_type: quickIssue.dept,
    issue_description: quickIssue.description + '\n\n— Reported by ' + staffName,
    priority: quickIssue.priority,
    status: 'Open',
    created_at: new Date().toISOString()
  });

  if (error) {
    showToast('Error submitting report: ' + error.message, 'error');
    if (btn) { btn.textContent = '🛠 Submit Report'; btn.disabled = false; }
    return;
  }

  app.innerHTML =
    '<div class="card success-wrap">' +
      '<div class="success-icon">🛠</div>' +
      '<div class="success-title">Issue Reported</div>' +
      '<div class="success-sub">Thanks — this has been sent to ' + quickIssue.dept + '.</div>' +
      '<button class="neu-btn primary block" style="margin-top:20px;" onclick="backToLanding()">Back to Menu</button>' +
    '</div>';
}

/* ── Assets view (read-only) ── */
async function viewAssets() {
  var loc = currentLoc;
  app.innerHTML = '<button class="back-link" onclick="backToLanding()">‹ Back to menu</button>' +
    '<div class="rr-header" style="padding:16px 18px;"><div class="rr-name" style="font-size:16px;">' + loc.display_name + '</div>' +
    '<div class="rr-meta">' + locSubtitle(loc) + '</div></div>' +
    '<div class="card"><div class="section-title">Assets on File</div><div id="assetsListView">Loading…</div></div>';

  var { data: assets, error } = await sb.from('room_assets').select('*')
    .eq('qr_identifier', loc.qr_identifier).eq('is_active', true).order('created_at', {ascending:true});

  var listEl = document.getElementById('assetsListView');
  if (error) { listEl.innerHTML = '<div style="color:var(--red);font-size:12.5px;">Error: ' + error.message + '</div>'; return; }
  if (!assets || !assets.length) { listEl.innerHTML = '<div style="color:var(--gray-light);font-size:12.5px;text-align:center;padding:12px;">No assets on file for this ' + (loc.location_type==='room'?'room':'area') + '.</div>'; return; }

  listEl.innerHTML = assets.map(function(a){
    var condColor = a.condition==='Good' ? 'rgba(34,197,94,.12);color:#16A34A' :
                    a.condition==='Fair' ? 'rgba(245,158,11,.12);color:#B45309' :
                    a.condition==='Needs Repair' ? 'rgba(239,68,68,.12);color:#DC2626' :
                    'rgba(107,114,128,.15);color:#6B7280';
    return '<div class="asset-item">' +
      '<div class="asset-icon">' + (ASSET_ICONS[a.asset_type]||'📦') + '</div>' +
      '<div class="asset-info"><div class="asset-name">' + a.asset_name + '</div>' +
      '<div class="asset-meta">' + (a.asset_type||'') + (a.serial_number?' · SN: '+a.serial_number:'') + '</div></div>' +
      '<span class="asset-condition" style="background:' + condColor + '">' + a.condition + '</span>' +
    '</div>';
  }).join('');
}

init();
</script>
