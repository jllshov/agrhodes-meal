<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="theme-color" content="#E8EAFF"/>
<title>A.G. Rhodes — Meal Check-In</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --bg:       #E8EAFF;
    --bg2:      #F2F3FF;
    --surface:  #FFFFFF;
    --border:   #D5D8F0;
    --accent:   #6B73FF;
    --accent-d: #5B5FC7;
    --accent-l: #EEF0FF;
    --gold:     #F59E0B;
    --danger:   #EF4444;
    --success:  #10B981;
    --text:     #1A1A3E;
    --text2:    #8A8FAD;
    --text3:    #B0B5D0;
    --shadow:   0 4px 24px rgba(107,115,255,0.10);
    --shadow-sm:0 2px 12px rgba(107,115,255,0.08);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 24px 20px;
  }

  .header { text-align: center; margin-bottom: 24px; }
  .logo { font-size: 1.6rem; font-weight: 800; color: var(--text); margin-bottom: 2px; }
  .logo span { color: var(--accent); }
  .tagline { color: var(--text2); font-size: .82rem; font-weight: 500; }
  .clock { color: var(--accent); font-size: .82rem; font-weight: 600; margin-top: 6px; }

  .card {
    background: var(--surface);
    border-radius: 28px;
    padding: 28px 24px;
    width: 100%;
    max-width: 400px;
    box-shadow: var(--shadow);
    border: 1px solid rgba(107,115,255,0.08);
  }

  .card-title {
    font-size: 1.1rem;
    font-weight: 800;
    color: var(--text);
    text-align: center;
    margin-bottom: 20px;
  }

  .steps { display: flex; align-items: center; justify-content: center; gap: 6px; margin-bottom: 24px; }
  .step {
    width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: .72rem; font-weight: 700;
    border: 2px solid var(--border);
    color: var(--text3);
    transition: all .3s;
    background: var(--surface);
  }
  .step.active { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
  .step.done { border-color: var(--accent); background: var(--accent); color: #fff; }
  .step-line { flex: 1; height: 2px; background: var(--border); max-width: 40px; transition: background .3s; border-radius: 2px; }
  .step-line.done { background: var(--accent); }

  .input-wrap { position: relative; margin-bottom: 14px; }
  input[type=text], input[type=number] {
    width: 100%;
    background: var(--bg2);
    border: 2px solid var(--border);
    border-radius: 16px;
    padding: 16px 18px;
    font-size: 1.1rem;
    font-family: inherit;
    font-weight: 600;
    color: var(--text);
    outline: none;
    text-align: center;
    letter-spacing: .15em;
    text-transform: uppercase;
    transition: border-color .2s, box-shadow .2s;
    -webkit-appearance: none;
    margin-bottom: 16px;
  }
  input[type=text]:focus, input[type=number]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(107,115,255,.12);
  }
  input[type=text]::placeholder, input[type=number]::placeholder {
    letter-spacing: normal; text-transform: none;
    color: var(--text3); font-size: .9rem; font-weight: 500;
  }

  .btn {
    width: 100%; padding: 17px; border-radius: 16px; border: none;
    font-size: 1rem; font-weight: 700; font-family: inherit;
    cursor: pointer; transition: all .2s; -webkit-appearance: none;
    letter-spacing: .02em;
  }
  .btn-primary { background: var(--accent); color: #fff; box-shadow: 0 4px 16px rgba(107,115,255,.3); }
  .btn-primary:active { background: var(--accent-d); transform: scale(.98); box-shadow: none; }
  .btn-primary:disabled { opacity: .5; cursor: not-allowed; transform: none; box-shadow: none; }
  .btn-outline {
    background: var(--bg2); color: var(--text2);
    border: 2px solid var(--border); font-weight: 600;
    margin-top: 10px; box-shadow: none;
  }
  .btn-outline:active { border-color: var(--accent); color: var(--accent); }
  .btn-ghost { background: transparent; color: var(--text2); font-weight: 600; margin-top: 10px; }

  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 16px 0; color: var(--text3); font-size: .78rem; font-weight: 600;
  }
  .divider::before, .divider::after { content:''; flex:1; height:1.5px; background:var(--border); border-radius:2px; }

  .inline-err {
    margin-top: 10px; padding: 11px 14px;
    background: #FEF2F2; border: 1.5px solid #FECACA;
    border-radius: 12px; color: #DC2626;
    font-size: .84rem; font-weight: 600; text-align: center; display: none;
  }

  .emp-banner {
    background: var(--accent-l);
    border: 1.5px solid rgba(107,115,255,.18);
    border-radius: 16px; padding: 14px 16px;
    margin-bottom: 18px; display: flex; align-items: center; gap: 12px;
  }
  .emp-banner .icon {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent); display: flex; align-items: center;
    justify-content: center; font-size: 1.2rem; flex-shrink: 0;
  }
  .emp-banner .name { font-weight: 800; font-size: .95rem; color: var(--text); }
  .emp-banner .dept { font-size: .76rem; color: var(--text2); font-weight: 500; margin-top: 2px; }

  .meal-choices { display: flex; gap: 12px; margin-bottom: 16px; }
  .meal-opt {
    flex: 1; padding: 18px 10px; border-radius: 20px;
    border: 2px solid var(--border); background: var(--bg2);
    cursor: pointer; text-align: center; transition: all .25s;
    -webkit-appearance: none; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .meal-opt:active { transform: scale(.97); }
  .meal-opt.sel-single { border-color: var(--accent); background: var(--accent-l); box-shadow: 0 0 0 4px rgba(107,115,255,.1); }
  .meal-opt.sel-bundle { border-color: var(--gold); background: #FFFBEB; box-shadow: 0 0 0 4px rgba(245,158,11,.1); }
  .meal-opt .oi { font-size: 1.8rem; }
  .meal-opt .ot { font-size: .88rem; font-weight: 800; color: var(--text); }
  .meal-opt .op { font-size: 1.2rem; font-weight: 800; }
  .single-color { color: var(--accent); }
  .bundle-color { color: var(--gold); }
  .meal-opt .os { font-size: .68rem; color: var(--text2); font-weight: 500; line-height: 1.3; }
  .save-badge {
    font-size: .68rem; font-weight: 700; color: #92400E;
    background: #FEF3C7; padding: 2px 8px; border-radius: 100px;
  }

  .free-banner {
    background: #FFFBEB; border: 2px solid #FDE68A;
    border-radius: 20px; padding: 20px; text-align: center; margin-bottom: 16px;
  }
  .free-banner .fi { font-size: 2rem; margin-bottom: 6px; }
  .free-banner .ft { font-size: 1rem; font-weight: 800; color: #92400E; }
  .free-banner .fs { font-size: .78rem; color: #B45309; font-weight: 500; margin-top: 4px; }

  .result { padding: 20px; border-radius: 20px; text-align: center; animation: fadeIn .3s ease; }
  @keyframes fadeIn { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
  .res-success { background: #F0FDF4; border: 2px solid #BBF7D0; }
  .res-free    { background: #FFFBEB; border: 2px solid #FDE68A; }
  .res-bundle  { background: var(--accent-l); border: 2px solid rgba(107,115,255,.25); }
  .res-error   { background: #FEF2F2; border: 2px solid #FECACA; }
  .res-warn    { background: #FFFBEB; border: 2px solid #FDE68A; }
  .ri { font-size: 2.4rem; margin-bottom: 8px; }
  .rn { font-size: 1.3rem; font-weight: 800; color: var(--text); margin-bottom: 3px; }
  .rd { color: var(--accent); font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
  .rm { color: var(--text2); font-size: .86rem; font-weight: 500; margin-bottom: 8px; }
  .rp { display: inline-block; border-radius: 100px; padding: 7px 20px; font-weight: 700; font-size: .9rem; margin-top: 6px; }
  .rp-green  { background: #D1FAE5; color: #065F46; }
  .rp-gold   { background: #FEF3C7; color: #92400E; }
  .rp-purple { background: var(--accent-l); color: var(--accent-d); }
  .credits { display: inline-block; margin-top: 8px; background: var(--accent-l); border-radius: 100px; padding: 4px 14px; color: var(--accent); font-size: .76rem; font-weight: 700; }

  .fg-wrap { margin-bottom: 16px; }
  .fg-label { display: block; font-size: .76rem; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 8px; }
  .fg-wrap input { letter-spacing: normal; text-transform: none; text-align: left; padding: 14px 16px; font-size: .95rem; }
  .fg-wrap input[type=number] { letter-spacing: normal; text-transform: none; text-align: left; }
  .pay-choices { display: flex; gap: 12px; }
  .pay-opt {
    flex: 1; padding: 16px 10px; border-radius: 18px;
    border: 2px solid var(--border); background: var(--bg2);
    cursor: pointer; text-align: center; transition: all .2s;
    -webkit-appearance: none; font-family: inherit;
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .pay-opt:active { transform: scale(.97); }
  .pay-opt.sel-card { border-color: var(--accent); background: var(--accent-l); box-shadow: 0 0 0 4px rgba(107,115,255,.1); }
  .pay-opt.sel-cash { border-color: var(--success); background: #F0FDF4; box-shadow: 0 0 0 4px rgba(16,185,129,.1); }
  .pay-icon { font-size: 1.8rem; }
  .pay-label { font-size: .82rem; font-weight: 700; color: var(--text); }

  .back-btn {
    background: none; border: none; color: var(--text2);
    font-size: .8rem; font-weight: 600; cursor: pointer;
    font-family: inherit; margin-top: 14px; display: block; width: 100%; text-align: center;
  }
  .back-btn:active { color: var(--accent); }

  .bottom-links { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
  .bottom-link {
    width: 100%; padding: 12px; border-radius: 14px;
    border: 1.5px solid var(--border); background: transparent;
    color: var(--text2); font-size: .84rem; font-weight: 600;
    font-family: inherit; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: all .2s; -webkit-appearance: none;
  }
  .bottom-link:active { border-color: var(--accent); color: var(--accent); background: var(--accent-l); }
  .admin-link { text-align: center; margin-top: 8px; }
  .admin-link a { color: var(--text3); font-size: .72rem; font-weight: 600; text-decoration: none; }

  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,.4);
    border-top-color: #fff; border-radius: 50%;
    animation: spin .7s linear infinite; display: inline-block;
    margin-right: 8px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .screen { display: none; }
  .screen.active { display: block; }

  .credit-banner {
    background: #FFFBEB; border: 2px solid #FDE68A;
    border-radius: 16px; padding: 16px 18px;
    margin-bottom: 16px; display: flex; align-items: center; gap: 14px;
  }
  .cb-icon { font-size: 1.8rem; flex-shrink: 0; }
  .cb-title { font-weight: 800; font-size: .95rem; color: #92400E; margin-bottom: 3px; }
  .cb-sub { font-size: .82rem; color: #B45309; font-weight: 500; }
  .cb-sub span { font-weight: 800; font-size: 1rem; color: #92400E; }

  .home-bar {
    display: flex; align-items: center; justify-content: space-between;
    width: 100%; max-width: 400px; margin-bottom: 16px; padding: 0 4px;
  }
  .home-btn {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: 100px; padding: 7px 14px;
    font-size: .78rem; font-weight: 700; color: var(--accent);
    text-decoration: none; box-shadow: var(--shadow-sm);
    transition: all .2s; font-family: inherit; cursor: pointer;
  }
  .home-btn:active { background: var(--accent-l); border-color: var(--accent); }
  .home-btn .hicon { font-size: .9rem; }
  .page-label {
    font-size: .72rem; font-weight: 700; color: var(--text2);
    text-transform: uppercase; letter-spacing: .08em;
  }
</style>
</head>
<body>

<div class="home-bar">
  <a href="https://agrhodes-cobb.vercel.app" class="home-btn">
    <span class="hicon">🏠</span> Home
  </a>
  <span class="page-label">Meal Check-In</span>
</div>

<div class="header">
  <div class="logo">🍽 Meal<span>Track</span></div>
  <div class="tagline">A.G. Rhodes Cobb</div>
  <div class="clock" id="clk"></div>
</div>

<div class="card">
  <div class="steps">
    <div class="step active" id="s1">1</div>
    <div class="step-line" id="l1"></div>
    <div class="step" id="s2">2</div>
    <div class="step-line" id="l2"></div>
    <div class="step" id="s3">3</div>
  </div>

  <!-- Screen 1: ID Entry -->
  <div class="screen active" id="scr-id">
    <div class="card-title">Enter Employee ID</div>
    <input type="text" id="empId" placeholder="Enter your Employee ID"
      maxlength="20" autocomplete="off" autocorrect="off"
      autocapitalize="characters" spellcheck="false" inputmode="numeric"/>
    <button class="btn btn-primary" id="lookupBtn">Continue →</button>
    <div class="inline-err" id="idErr"></div>
    <div class="divider">or</div>
    <div class="bottom-links">
      <button class="bottom-link" id="feedbackBtn">💬 Share Meal Feedback</button>
      <button class="bottom-link" id="guestBtn">🧑‍🤝‍🧑 Guest Check-In</button>
    </div>
    <div class="admin-link">
      <a href="/admin" target="_blank">Admin Panel</a>
    </div>
  </div>

  <!-- Screen 2: Meal Choice -->
  <div class="screen" id="scr-choice">
    <div class="card-title">Choose Your Meal</div>
    <div id="regularFlow">
      <div class="emp-banner">
        <div class="icon">👤</div>
        <div>
          <div class="name" id="bannerName"></div>
          <div class="dept" id="bannerDept"></div>
        </div>
      </div>
      <div id="creditArea" style="display:none">
        <div class="credit-banner">
          <div class="cb-icon">🎟</div>
          <div>
            <div class="cb-title">Bundle Credit</div>
            <div class="cb-sub"><span id="creditCount">0</span> meal(s) remaining on your bundle</div>
          </div>
        </div>
      </div>
      <div id="mealChoiceArea" class="meal-choices">
        <button class="meal-opt" id="opt-single" onclick="selectOpt('single')">
          <div class="oi">🍽</div>
          <div class="ot">1 Meal</div>
          <div class="op single-color">$2.50</div>
          <div class="os">Single ticket</div>
        </button>
        <button class="meal-opt" id="opt-bundle" onclick="selectOpt('bundle')">
          <div class="oi">🎟</div>
          <div class="ot">5 Meals</div>
          <div class="op bundle-color">$9.00</div>
          <div class="save-badge">Save $3.50</div>
          <div class="os">Use over 5 check-ins</div>
        </button>
      </div>
      <button class="btn btn-primary" id="confirmBtn" disabled onclick="doCheckin()">Confirm Check-In</button>
    </div>
    <div id="freeFlow" style="display:none">
      <div class="free-banner">
        <div class="fi">🎉</div>
        <div class="ft" id="freeName"></div>
        <div class="fs">20+ years of service — your meal is free!</div>
      </div>
      <button class="btn btn-primary" id="freeBtn" onclick="doCheckin()">Check In — Free Meal ✨</button>
    </div>
    <button class="back-btn" onclick="goBack()">← Change ID</button>
  </div>

  <!-- Screen 3: Confirmation + Ticket -->
  <div class="screen" id="scr-done">
    <div class="result" id="resultBox">
      <div class="ri" id="rI"></div>
      <div class="rn" id="rN"></div>
      <div class="rd" id="rD"></div>
      <div class="rm" id="rM"></div>
      <div class="rp" id="rP"></div>
      <div class="credits" id="rC" style="display:none"></div>
    </div>
    <!-- Digital Ticket -->
    <div id="ticketBox" style="display:none;margin-top:16px;background:#FFFBEB;border:2px dashed #FDE68A;border-radius:20px;padding:20px;text-align:center">
      <div style="font-size:.7rem;font-weight:700;color:#B45309;text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px">Meal Ticket</div>
      <div style="font-size:1.2rem;font-weight:800;color:#1A1A3E;margin-bottom:4px" id="tktName"></div>
      <div style="font-size:.78rem;color:#8A8FAD;font-weight:500;margin-bottom:12px" id="tktDept"></div>
      <div style="display:flex;justify-content:space-around;margin-bottom:12px">
        <div><div style="font-size:.68rem;color:#B45309;font-weight:700;text-transform:uppercase">Type</div><div style="font-size:.88rem;font-weight:700;color:#1A1A3E" id="tktType"></div></div>
        <div><div style="font-size:.68rem;color:#B45309;font-weight:700;text-transform:uppercase">Date</div><div style="font-size:.88rem;font-weight:700;color:#1A1A3E" id="tktDate"></div></div>
        <div><div style="font-size:.68rem;color:#B45309;font-weight:700;text-transform:uppercase">Time</div><div style="font-size:.88rem;font-weight:700;color:#1A1A3E" id="tktTime"></div></div>
      </div>
      <div style="font-size:.68rem;color:#B45309;font-weight:700;text-transform:uppercase;margin-bottom:4px">Ticket #</div>
      <div style="font-size:1.1rem;font-weight:800;color:#92400E;letter-spacing:.1em" id="tktNum"></div>
      <div style="font-size:.68rem;color:#B45309;margin-top:8px">Valid for 30 minutes from purchase</div>
    </div>
    <button class="btn btn-outline" id="showTicketBtn" onclick="showTicket()" style="margin-top:16px;display:none">🎟 Show Meal Ticket</button>
    <button class="btn btn-outline" onclick="resetAll()" style="margin-top:10px">← New Check-In</button>
  </div>

  <!-- Screen G: Guest Form -->
  <div class="screen" id="scr-guest">
    <div class="card-title">Guest Check-In</div>
    <div class="fg-wrap">
      <label class="fg-label">Guest Name</label>
      <input type="text" id="guestName" placeholder="Enter guest name"
        autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>
    <div class="fg-wrap">
      <label class="fg-label">Amount ($)</label>
      <input type="number" id="guestAmount" placeholder="0.00" min="0" step="0.01" inputmode="decimal"/>
    </div>
    <div class="fg-wrap">
      <label class="fg-label">Payment Type</label>
      <div class="pay-choices">
        <button class="pay-opt" id="pay-card" onclick="selectPay('card')">
          <div class="pay-icon">💳</div>
          <div class="pay-label">Credit Card</div>
        </button>
        <button class="pay-opt" id="pay-cash" onclick="selectPay('cash')">
          <div class="pay-icon">💵</div>
          <div class="pay-label">Cash</div>
        </button>
      </div>
    </div>
    <div class="inline-err" id="guestErr"></div>
    <button class="btn btn-primary" id="guestSubmitBtn" onclick="submitGuest()">Complete Guest Check-In</button>
    <button class="back-btn" onclick="cancelGuest()">← Back</button>
  </div>

</div>

<script>
// ─── Supabase config ────────────────────────────────────────
const SUPABASE_URL      = "https://gtbiatetqyuxwuehwilr.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YmlhdGV0cXl1eHd1ZWh3aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTgzMjcsImV4cCI6MjA5NTM5NDMyN30.C9nsE4uMqLt8DZTWXZVLToHWMG3ApKyb702hDQSIr34";
const FACILITY_SUBDOMAIN = "agrhodes-cobb";
const FEEDBACK_URL = "/feedback";

let emp = null, selOpt = null, selPay = null;
let facilityId = null, facilityConfig = null;

// ─── Supabase REST helper ───────────────────────────────────
async function sbFetch(path, options = {}) {
  const res = await fetch(`${SUPABASE_URL}/rest/v1/${path}`, {
    ...options,
    headers: {
      "apikey": SUPABASE_ANON_KEY,
      "Authorization": `Bearer ${SUPABASE_ANON_KEY}`,
      "Content-Type": "application/json",
      "Prefer": "return=representation",
      ...(options.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({}));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  return res.json();
}

// ─── Load facility + config once on page load ───────────────
async function loadFacility() {
  try {
    const facilities = await sbFetch(`facilities?subdomain=eq.${FACILITY_SUBDOMAIN}&select=id`);
    if (!facilities.length) return;
    facilityId = facilities[0].id;
    const configs = await sbFetch(`facility_config?facility_id=eq.${facilityId}&select=*`);
    if (configs.length) facilityConfig = configs[0];
  } catch(e) { console.error('Facility load error:', e); }
}
loadFacility();

// ─── Clock ──────────────────────────────────────────────────
function updateClock() {
  document.getElementById('clk').textContent =
    new Date().toLocaleTimeString('en-US',{weekday:'short',month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'});
}
setInterval(updateClock, 1000); updateClock();

// ─── Step indicator ─────────────────────────────────────────
function setStep(n) {
  [1,2,3].forEach(i => {
    document.getElementById('s'+i).className = 'step'+(i<n?' done':i===n?' active':'');
    if(i<3) document.getElementById('l'+i).className = 'step-line'+(i<n?' done':'');
  });
}
function showScr(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('scr-'+name).classList.add('active');
  setStep({id:1,choice:2,done:3,guest:1}[name]);
}

// ─── Today's meal logs for an employee ──────────────────────
async function getTodayLogs(employeeId) {
  const todayStart = new Date(); todayStart.setHours(0,0,0,0);
  const todayEnd   = new Date(); todayEnd.setHours(23,59,59,999);
  return sbFetch(
    `meal_logs?employee_id=eq.${employeeId}&is_voided=eq.false` +
    `&checked_in_at=gte.${todayStart.toISOString()}` +
    `&checked_in_at=lte.${todayEnd.toISOString()}` +
    `&select=*&order=checked_in_at.desc`
  );
}

// ─── Get bundle credits remaining ───────────────────────────
// Bundle credit = purchased a bundle earlier today but hasn't used all 5 meals yet
function getBundleCredits(todayLogs, config) {
  const bundleLog = todayLogs.find(l => l.meal_type === 'bundle');
  if (!bundleLog) return 0;
  const usedAfterBundle = todayLogs.filter(l =>
    l.meal_type === 'credit' || (l.meal_type === 'bundle')
  ).length;
  const bundleSize = config ? config.bundle_meal_count : 5;
  return Math.max(0, bundleSize - usedAfterBundle);
}

// ─── Lookup employee (Step 1 → Step 2) ──────────────────────
async function lookup() {
  const id = document.getElementById('empId').value.trim().toUpperCase();
  if (!id) return;
  const btn = document.getElementById('lookupBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Looking up…';
  document.getElementById('idErr').style.display = 'none';

  try {
    if (!facilityId) await loadFacility();
    if (!facilityId) throw new Error('Facility not available. Please try again.');

    // Look up employee
    const employees = await sbFetch(
      `employees?facility_id=eq.${facilityId}&employee_number=eq.${encodeURIComponent(id)}&is_active=eq.true&select=*`
    );
    if (!employees.length) {
      const el = document.getElementById('idErr');
      el.textContent = 'Employee ID not found. Please check and try again.';
      el.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Continue →';
      return;
    }
    emp = employees[0];

    // Get today's logs
    const todayLogs = await getTodayLogs(emp.id);
    const config    = facilityConfig;
    const dailyLimit = config ? config.daily_meal_limit : 5;

    // Daily limit check
    if (todayLogs.length >= dailyLimit) {
      const el = document.getElementById('idErr');
      el.textContent = `Daily limit of ${dailyLimit} meals reached.`;
      el.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Continue →';
      return;
    }

    // Cooldown check
    if (todayLogs.length > 0) {
      const cooldown = config ? config.cooldown_minutes : 30;
      const lastCheckin = new Date(todayLogs[0].checked_in_at);
      const minutesSince = (Date.now() - lastCheckin.getTime()) / 60000;
      if (minutesSince < cooldown) {
        const waitMins = Math.ceil(cooldown - minutesSince);
        const el = document.getElementById('idErr');
        el.textContent = `Please wait ${waitMins} more minute${waitMins !== 1 ? 's' : ''} before checking in again.`;
        el.style.display = 'block';
        btn.disabled = false; btn.textContent = 'Continue →';
        return;
      }
    }

    // Store today logs on emp for use in doCheckin
    emp.todayLogs = todayLogs;

    const bundleCredits = getBundleCredits(todayLogs, config);

    if (emp.is_free_meal_eligible) {
      selOpt = 'free';
      document.getElementById('freeFlow').style.display = 'block';
      document.getElementById('regularFlow').style.display = 'none';
      document.getElementById('freeName').textContent = emp.first_name + ' ' + emp.last_name;
      showScr('choice');
    } else if (bundleCredits > 0) {
      selOpt = 'credit';
      document.getElementById('regularFlow').style.display = 'block';
      document.getElementById('freeFlow').style.display = 'none';
      document.getElementById('bannerName').textContent = emp.first_name + ' ' + emp.last_name;
      document.getElementById('bannerDept').textContent = emp.unit || 'A.G. Rhodes Cobb';
      document.getElementById('mealChoiceArea').style.display = 'none';
      document.getElementById('creditArea').style.display = 'block';
      document.getElementById('creditCount').textContent = bundleCredits;
      document.getElementById('confirmBtn').disabled = false;
      document.getElementById('confirmBtn').textContent = 'Use Bundle Credit →';
      emp.bundleCredits = bundleCredits;
      showScr('choice');
    } else {
      selOpt = null;
      document.getElementById('regularFlow').style.display = 'block';
      document.getElementById('freeFlow').style.display = 'none';
      document.getElementById('bannerName').textContent = emp.first_name + ' ' + emp.last_name;
      document.getElementById('bannerDept').textContent = emp.unit || 'A.G. Rhodes Cobb';
      document.getElementById('mealChoiceArea').style.display = 'flex';
      document.getElementById('creditArea').style.display = 'none';
      document.getElementById('opt-single').className = 'meal-opt';
      document.getElementById('opt-bundle').className = 'meal-opt';
      document.getElementById('confirmBtn').disabled = true;
      document.getElementById('confirmBtn').textContent = 'Confirm Check-In';
      showScr('choice');
    }
  } catch(e) {
    console.error(e);
    const el = document.getElementById('idErr');
    el.textContent = e.message || 'Connection error. Please try again.';
    el.style.display = 'block';
  }

  btn.disabled = false; btn.textContent = 'Continue →';
}

function selectOpt(opt) {
  selOpt = opt;
  document.getElementById('opt-single').className = 'meal-opt'+(opt==='single'?' sel-single':'');
  document.getElementById('opt-bundle').className = 'meal-opt'+(opt==='bundle'?' sel-bundle':'');
  document.getElementById('confirmBtn').disabled = false;
}

function goBack() {
  emp = null; selOpt = null;
  document.getElementById('empId').value = '';
  document.getElementById('idErr').style.display = 'none';
  showScr('id');
}

// ─── Do check-in (Step 2 → Step 3) ──────────────────────────
async function doCheckin() {
  const isFree = selOpt === 'free';
  const btn = isFree ? document.getElementById('freeBtn') : document.getElementById('confirmBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Checking in…';

  try {
    const config       = facilityConfig;
    const singlePrice  = config ? parseFloat(config.single_meal_price) : 2.50;
    const bundlePrice  = config ? parseFloat(config.bundle_price) : 9.00;
    const bundleSize   = config ? config.bundle_meal_count : 5;

    let mealType      = selOpt === 'bundle' ? 'bundle' : selOpt === 'credit' ? 'credit' : selOpt === 'free' ? 'free' : 'single';
    let amountCharged = 0.00;
    if (selOpt === 'single')  amountCharged = singlePrice;
    if (selOpt === 'bundle')  amountCharged = bundlePrice;

    // Get active payroll period
    const today = new Date().toISOString().split('T')[0];
    const periods = await sbFetch(
      `payroll_periods?facility_id=eq.${facilityId}&is_closed=eq.false&period_start=lte.${today}&period_end=gte.${today}&select=id&limit=1`
    );
    const payrollPeriodId = periods.length ? periods[0].id : null;

    // Generate ticket number
    const ticketNumber = Math.random().toString(36).substr(2,6).toUpperCase();

    // Insert meal log
    await sbFetch('meal_logs', {
      method: 'POST',
      body: JSON.stringify({
        facility_id:       facilityId,
        employee_id:       emp.id,
        payroll_period_id: payrollPeriodId,
        meal_type:         mealType,
        amount_charged:    amountCharged,
        is_free_meal:      isFree,
        checked_in_at:     new Date().toISOString(),
        ticket_number:     ticketNumber
      })
    });

    // Calculate bundle remaining
    let bundleRemaining = 0;
    if (selOpt === 'bundle') {
      bundleRemaining = bundleSize - 1; // just bought, used 1
    } else if (selOpt === 'credit') {
      bundleRemaining = Math.max(0, (emp.bundleCredits || 1) - 1);
    }

    const now = new Date();
    showDone({
      employee_name:    emp.first_name + ' ' + emp.last_name,
      department:       emp.unit || '',
      is_free:          isFree,
      meal_option:      selOpt,
      bundle_remaining: bundleRemaining,
      time: now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }),
      date: now.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })
    });

  } catch(e) {
    console.error(e);
    btn.disabled = false;
    btn.textContent = isFree ? 'Check In — Free Meal ✨' : 'Confirm Check-In';
    const el = document.getElementById('idErr');
    el.textContent = e.message || 'Connection error. Please try again.';
    el.style.display = 'block';
    showScr('id');
  }
}

let lastTicket = null;

function generateTicketNum() {
  return Math.random().toString(36).substr(2,6).toUpperCase();
}

function showDone(d) {
  showScr('done');
  const isBundle  = d.meal_option === 'bundle';
  const isCredit  = d.meal_option === 'credit';
  const isFree    = d.is_free;
  const remaining = d.bundle_remaining || 0;
  const box = document.getElementById('resultBox');
  box.className = 'result '+(isFree?'res-free':(isBundle||isCredit)?'res-bundle':'res-success');
  document.getElementById('rI').textContent = isFree?'🎉':(isBundle||isCredit)?'🎟':'✅';
  document.getElementById('rN').textContent = d.employee_name;
  document.getElementById('rD').textContent = d.department || '';
  document.getElementById('rM').textContent = 'Logged at '+d.time+' on '+d.date;
  const rp = document.getElementById('rP');
  rp.className = 'rp '+(isFree?'rp-gold':(isBundle||isCredit)?'rp-purple':'rp-green');
  if(isFree)        rp.textContent = '✨ FREE MEAL';
  else if(isBundle) rp.textContent = '🎟 Bundle purchased — $9.00';
  else if(isCredit) rp.textContent = '🎟 Bundle credit used — $0.00';
  else              rp.textContent = '1 Meal — $2.50';
  const rc = document.getElementById('rC');
  if((isBundle||isCredit) && remaining > 0) {
    rc.style.display='inline-block'; rc.style.background=''; rc.style.color='';
    rc.textContent = remaining+' bundle meal'+(remaining===1?'':'s')+' remaining';
  } else if((isBundle||isCredit) && remaining === 0) {
    rc.style.display='inline-block'; rc.style.background='#F2F3FF'; rc.style.color='#8A8FAD';
    rc.textContent = 'Bundle fully used — purchase a new one next time';
  } else { rc.style.display='none'; }

  // Store ticket info
  lastTicket = {
    name: d.employee_name,
    dept: d.department || 'A.G. Rhodes Cobb',
    type: isFree ? 'Free Meal' : isBundle ? 'Bundle (5 meals)' : isCredit ? 'Bundle Credit' : 'Single Meal',
    date: d.date,
    time: d.time,
    num:  d.ticket_number || generateTicketNum()
  };

  // Show ticket button
  document.getElementById('showTicketBtn').style.display = 'block';
  document.getElementById('ticketBox').style.display = 'none';
}

function showTicket() {
  if (!lastTicket) return;
  document.getElementById('tktName').textContent = lastTicket.name;
  document.getElementById('tktDept').textContent = lastTicket.dept;
  document.getElementById('tktType').textContent = lastTicket.type;
  document.getElementById('tktDate').textContent = lastTicket.date;
  document.getElementById('tktTime').textContent = lastTicket.time;
  document.getElementById('tktNum').textContent  = lastTicket.num;
  document.getElementById('ticketBox').style.display = 'block';
  document.getElementById('showTicketBtn').style.display = 'none';
}

function resetAll() {
  emp = null; selOpt = null; selPay = null;
  document.getElementById('empId').value = '';
  document.getElementById('idErr').style.display = 'none';
  document.getElementById('mealChoiceArea').style.display = 'flex';
  document.getElementById('creditArea').style.display = 'none';
  document.getElementById('confirmBtn').disabled = true;
  document.getElementById('confirmBtn').textContent = 'Confirm Check-In';
  showScr('id');
}

// ─── Guest check-in ─────────────────────────────────────────
document.getElementById('guestBtn').addEventListener('click', function() {
  selPay = null;
  document.getElementById('guestName').value = '';
  document.getElementById('guestAmount').value = '';
  document.getElementById('pay-card').className = 'pay-opt';
  document.getElementById('pay-cash').className = 'pay-opt';
  document.getElementById('guestErr').style.display = 'none';
  showScr('guest');
});

function selectPay(type) {
  selPay = type;
  document.getElementById('pay-card').className = 'pay-opt'+(type==='card'?' sel-card':'');
  document.getElementById('pay-cash').className = 'pay-opt'+(type==='cash'?' sel-cash':'');
}

function cancelGuest() { selPay = null; showScr('id'); }

async function submitGuest() {
  const name   = document.getElementById('guestName').value.trim();
  const amount = parseFloat(document.getElementById('guestAmount').value);
  const errEl  = document.getElementById('guestErr');
  errEl.style.display = 'none';
  if (!name)              { errEl.textContent='Please enter the guest name.'; errEl.style.display='block'; return; }
  if (!amount||amount<=0) { errEl.textContent='Please enter a valid amount.'; errEl.style.display='block'; return; }
  if (!selPay)            { errEl.textContent='Please select a payment type.'; errEl.style.display='block'; return; }

  const btn = document.getElementById('guestSubmitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span>Processing…';

  try {
    // Insert guest log into meal_logs with meal_type = 'single' and a note
    await sbFetch('meal_logs', {
      method: 'POST',
      body: JSON.stringify({
        facility_id:    facilityId,
        employee_id:    null,
        meal_type:      'single',
        amount_charged: amount,
        is_free_meal:   false,
        checked_in_at:  new Date().toISOString(),
        void_reason:    `Guest: ${name} | Payment: ${selPay}`
      })
    });

    const now = new Date();
    showScr('done');
    const box = document.getElementById('resultBox');
    box.className = 'result res-success';
    document.getElementById('rI').textContent = selPay==='card'?'💳':'💵';
    document.getElementById('rN').textContent = name;
    document.getElementById('rD').textContent = 'Guest Visitor';
    document.getElementById('rM').textContent = 'Logged at '+
      now.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'})+' on '+
      now.toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});
    const rp = document.getElementById('rP');
    rp.className = 'rp rp-green';
    rp.textContent = (selPay==='card'?'Credit Card':'Cash')+' — $'+amount.toFixed(2);
    document.getElementById('rC').style.display='none';
  } catch(e) {
    errEl.textContent = e.message || 'Connection error. Please try again.';
    errEl.style.display='block';
  }

  btn.disabled = false; btn.textContent = 'Complete Guest Check-In';
}

document.getElementById('lookupBtn').addEventListener('click', lookup);
document.getElementById('empId').addEventListener('keydown', e => { if(e.key==='Enter') lookup(); });
document.getElementById('feedbackBtn').addEventListener('click', function() {
  window.location.href = FEEDBACK_URL;
});
