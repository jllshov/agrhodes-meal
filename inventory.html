<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
<title>A.G. Rhodes — Patient Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EAEEF2;
  --surface: #EEF1F5;
  --orange: #F5A623;
  --orange-light: #FFF3DC;
  --black: #1A1A1A;
  --gray: #6B7280;
  --gray-light: #9CA3AF;
  --green: #22C55E;
  --red: #EF4444;
  --amber: #F59E0B;
  --shadow-out: 6px 6px 14px #C8CDD5, -6px -6px 14px #FFFFFF;
  --shadow-in: inset 4px 4px 10px #C8CDD5, inset -4px -4px 10px #FFFFFF;
  --shadow-card: 8px 8px 20px #C5CAD1, -8px -8px 20px #FFFFFF;
  --r: 20px;
  --r-sm: 12px;
  --r-pill: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); }
body { min-height: 100vh; padding-bottom: 100px; }
.wrap { max-width: 520px; margin: 0 auto; padding: 20px 16px; }

.rr-header { background: var(--surface); border-radius: 24px; box-shadow: var(--shadow-card); padding: 22px 20px; text-align: center; margin-bottom: 18px; }
.rr-icon { font-size: 30px; margin-bottom: 6px; }
.rr-name { font-size: 21px; font-weight: 800; letter-spacing: -.02em; }
.rr-meta { font-size: 12.5px; color: var(--gray); margin-top: 3px; }

.neu-btn { padding: 12px 20px; border-radius: var(--r-pill); border: none; cursor: pointer; font-family: inherit; font-size: 14px; font-weight: 600; background: var(--surface); box-shadow: var(--shadow-out); color: var(--black); transition: all .15s; }
.neu-btn:active { box-shadow: var(--shadow-in); }
.neu-btn.primary { background: var(--orange); color: white; box-shadow: 4px 4px 12px rgba(245,166,35,.5), -2px -2px 8px rgba(245,166,35,.2); }
.neu-btn.primary:active { box-shadow: inset 3px 3px 8px rgba(0,0,0,.15); }
.neu-btn.block { width: 100%; }
.neu-btn.ghost { background: transparent; box-shadow: none; color: var(--gray); font-size: 13px; }

.card { background: var(--surface); border-radius: 22px; box-shadow: var(--shadow-card); padding: 20px; margin-bottom: 14px; }
.section-title { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .06em; color: var(--gray); margin-bottom: 12px; }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 11px; font-weight: 600; color: var(--gray); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
.field input, .field select, .field textarea {
  width: 100%; padding: 11px 12px; border: none; border-radius: var(--r-sm);
  background: var(--bg); box-shadow: var(--shadow-in); font-family: inherit; font-size: 13.5px; color: var(--black); resize: vertical;
}

.inv-check-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 4px; }
.inv-check-item { display: flex; align-items: center; gap: 9px; background: var(--bg); border-radius: 12px; padding: 12px 13px; cursor: pointer; font-size: 12.5px; font-weight: 600; box-shadow: var(--shadow-out); }
.inv-check-item.checked { background: var(--orange-light); box-shadow: var(--shadow-in); }
.inv-check-item input { width: 17px; height: 17px; accent-color: var(--orange); flex-shrink: 0; }

.inv-expand-card { background: var(--bg); border-radius: 16px; padding: 14px 16px; margin-top: 12px; box-shadow: var(--shadow-in); }
.inv-expand-title { font-size: 13.5px; font-weight: 800; margin-bottom: 10px; }
.inv-field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
.inv-yn-row { display: flex; gap: 6px; }
.inv-yn-btn { flex: 1; padding: 9px; border-radius: 10px; border: none; cursor: pointer; font-family: inherit; font-size: 12px; font-weight: 700; background: var(--surface); box-shadow: var(--shadow-out); color: var(--gray); }
.inv-yn-btn.sel-yes { background: rgba(34,197,94,.15); color: #16A34A; box-shadow: none; }
.inv-yn-btn.sel-no { background: rgba(239,68,68,.12); color: var(--red); box-shadow: none; }

.inv-photo-wrap { margin-bottom: 10px; }
.inv-photo-preview { width: 100%; border-radius: 12px; display: block; margin-bottom: 8px; max-height: 220px; object-fit: cover; }

.view-item-card { background: var(--bg); border-radius: 16px; padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow-out); }
.view-item-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.view-item-name { font-size: 13.5px; font-weight: 800; }
.view-item-badge { font-size: 10.5px; font-weight: 700; padding: 3px 9px; border-radius: 999px; background: var(--orange-light); color: #92400E; }
.view-item-meta { font-size: 12px; color: var(--gray); line-height: 1.5; }
.view-item-photo { width: 100%; border-radius: 12px; margin-top: 8px; max-height: 260px; object-fit: cover; cursor: pointer; }

.share-box { background: var(--bg); border-radius: 20px; padding: 20px; text-align: center; margin-top: 16px; }
.share-qr { background: white; border-radius: 16px; padding: 14px; width: 180px; margin: 0 auto 14px; box-shadow: var(--shadow-out); }
.share-link-row { display: flex; gap: 8px; margin-top: 10px; }
.share-link-row input { flex: 1; padding: 10px 12px; border: none; border-radius: 10px; background: var(--surface); box-shadow: var(--shadow-in); font-family: 'DM Mono', monospace; font-size: 11px; color: var(--gray); }

.success-wrap { text-align: center; padding: 30px 20px; }
.success-icon { font-size: 56px; margin-bottom: 14px; }
.success-title { font-size: 20px; font-weight: 800; }
.success-sub { font-size: 13px; color: var(--gray); margin-top: 6px; }

.center-msg { text-align: center; padding: 60px 20px; color: var(--gray); font-size: 13.5px; }
.back-link { display: inline-flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--gray); background: none; border: none; cursor: pointer; font-family: inherit; margin-bottom: 14px; }

.progress-bar-wrap { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); box-shadow: 0 -6px 20px rgba(0,0,0,.08); padding: 14px 16px; z-index: 50; }
.progress-bar-inner { max-width: 520px; margin: 0 auto; display: flex; align-items: center; justify-content: flex-end; gap: 12px; }

.toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); z-index: 300; max-width: 440px; width: calc(100% - 32px); background: var(--black); color: white; padding: 14px 18px; border-radius: 14px; font-size: 13px; font-weight: 600; box-shadow: 0 10px 30px rgba(0,0,0,.25); display: flex; align-items: center; gap: 10px; }
.toast.error { background: #DC2626; }
.toast-close { margin-left: auto; background: none; border: none; color: white; font-size: 16px; cursor: pointer; opacity: .8; flex-shrink:0; }
</style>
</head>
<body>

<div class="wrap" id="app">
  <div class="center-msg" id="loadingMsg">Loading…</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL  = 'https://gtbiatetqyuxwuehwilr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YmlhdGV0cXl1eHd1ZWh3aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTgzMjcsImV4cCI6MjA5NTM5NDMyN30.C9nsE4uMqLt8DZTWXZVLToHWMG3ApKyb702hDQSIr34';
const FACILITY_ID   = '30f74349-3ab8-483b-a587-f372c0fbd413';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const VIEW_BASE_URL = window.location.origin + '/inventory.html#view=';
const NEW_URL = window.location.origin + '/inventory.html#new';
const app = document.getElementById('app');

/* ── Toast (in-page, no native alert/confirm dependency) ── */
function showToast(msg, type) {
  var existing = document.getElementById('appToast');
  if (existing) existing.remove();
  var t = document.createElement('div');
  t.id = 'appToast';
  t.className = 'toast' + (type ? ' ' + type : '');
  t.innerHTML = '<span>' + msg + '</span><button class="toast-close" onclick="this.parentElement.remove()">✕</button>';
  document.body.appendChild(t);
  if (type !== 'error') setTimeout(function(){ if (t && t.parentElement) t.remove(); }, 4000);
}

var INVENTORY_ITEMS = [
  { key:'glasses', label:'Glasses' },
  { key:'hearing_aid_l', label:'Hearing Aid (L)' },
  { key:'hearing_aid_r', label:'Hearing Aid (R)' },
  { key:'dentures_upper', label:'Dentures (Upper)' },
  { key:'dentures_lower', label:'Dentures (Lower)' },
  { key:'jewelry', label:'Jewelry' },
  { key:'cell_phone', label:'Cell Phone' },
  { key:'phone_charger', label:'Phone Charger' },
  { key:'wallet_purse', label:'Wallet/Purse' },
  { key:'cash', label:'Cash', special:'cash' },
  { key:'keys', label:'Keys' },
  { key:'clothing', label:'Clothing', qtyLabel:'Count (items)' },
  { key:'shoes', label:'Shoes', qtyLabel:'Pairs' },
  { key:'walker', label:'Walker' },
  { key:'wheelchair', label:'Wheelchair' },
  { key:'cane', label:'Cane' },
  { key:'cpap_bipap', label:'CPAP/BiPAP' },
  { key:'hygiene_bag', label:'Personal Hygiene Bag' },
  { key:'other', label:'Other', special:'other' }
];
var invSelected = {}; // key -> { quantity, amount, condition, label_applied, comments, other_desc, photoFile, photoPreviewUrl }

function getMode() {
  var hash = window.location.hash.slice(1);
  if (hash.indexOf('view=') === 0) return { mode:'view', id: hash.slice(5) };
  return { mode:'new' };
}

function init() {
  var m = getMode();
  if (m.mode === 'view') loadAndRenderView(m.id);
  else renderNewIntakeForm();
}

/* ══════════ NEW INTAKE ══════════ */
function renderNewIntakeForm() {
  invSelected = {};
  app.innerHTML =
    '<div class="rr-header">' +
      '<div class="rr-icon">🧳</div>' +
      '<div class="rr-name">Patient Inventory Intake</div>' +
      '<div class="rr-meta">A.G. Rhodes — Atlanta</div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="section-title">Resident Info</div>' +
      '<div class="field"><label>Resident Name</label><input type="text" id="inv-resident-name" placeholder="Jane Doe"></div>' +
      '<div class="field"><label>Room</label><input type="text" id="inv-room" placeholder="Room 112"></div>' +
      '<div class="field"><label>Completed By</label><input type="text" id="inv-completed-by" placeholder="Your name" value="' + (localStorage.getItem('agrhodes_inv_staff')||'').replace(/"/g,'&quot;') + '"></div>' +
    '</div>' +
    '<div class="card">' +
      '<div class="section-title">Belongings — check what the resident brought in</div>' +
      '<div class="inv-check-grid" id="invCheckGrid"></div>' +
      '<div id="invExpandList"></div>' +
    '</div>' +
    '<button class="neu-btn primary block" onclick="saveInventory()">✓ Save Inventory</button>' +
    '<div style="height:20px;"></div>';
  renderInvCheckGrid();
  renderInvExpandList();
}

function renderInvCheckGrid() {
  var grid = document.getElementById('invCheckGrid');
  grid.innerHTML = INVENTORY_ITEMS.map(function(item){
    var checked = !!invSelected[item.key];
    return '<label class="inv-check-item' + (checked?' checked':'') + '">' +
      '<input type="checkbox" ' + (checked?'checked':'') + ' onchange="toggleInvItem(\''+item.key+'\')">' +
      '<span>' + item.label + '</span>' +
    '</label>';
  }).join('');
}

function toggleInvItem(key) {
  if (invSelected[key]) {
    if (invSelected[key].photoPreviewUrl) URL.revokeObjectURL(invSelected[key].photoPreviewUrl);
    delete invSelected[key];
  } else {
    invSelected[key] = { quantity:1, amount:'', condition:'Good', label_applied:'No', comments:'', other_desc:'', photoFile:null, photoPreviewUrl:null };
  }
  renderInvCheckGrid();
  renderInvExpandList();
}

function renderInvExpandList() {
  var list = document.getElementById('invExpandList');
  var selectedItems = INVENTORY_ITEMS.filter(function(i){ return invSelected[i.key]; });
  if (!selectedItems.length) { list.innerHTML = ''; return; }

  list.innerHTML = selectedItems.map(function(item){
    var d = invSelected[item.key];
    var qtyField = item.special === 'cash'
      ? '<div class="field" style="margin-bottom:0;"><label>Amount ($)</label><input type="number" step="0.01" min="0" value="'+d.amount+'" oninput="updateInvField(\''+item.key+'\',\'amount\',this.value)"></div>'
      : '<div class="field" style="margin-bottom:0;"><label>' + (item.qtyLabel || 'Quantity') + '</label><input type="number" min="0" value="'+d.quantity+'" oninput="updateInvField(\''+item.key+'\',\'quantity\',this.value)"></div>';

    var otherField = item.special === 'other'
      ? '<div class="field"><label>What is it?</label><input type="text" value="'+(d.other_desc||'').replace(/"/g,'&quot;')+'" placeholder="Describe the item" oninput="updateInvField(\''+item.key+'\',\'other_desc\',this.value)"></div>'
      : '';

    var photoHtml = d.photoPreviewUrl
      ? '<img class="inv-photo-preview" src="'+d.photoPreviewUrl+'"><button class="neu-btn" style="font-size:11.5px;margin-bottom:10px;" onclick="removeItemPhoto(\''+item.key+'\')">✕ Remove Photo</button>'
      : '<button class="neu-btn block" style="margin-bottom:10px;" onclick="document.getElementById(\'photoInput-'+item.key+'\').click()">📷 Take / Choose Photo</button>';

    return '<div class="inv-expand-card">' +
      '<div class="inv-expand-title">' + item.label + '</div>' +
      otherField +
      '<div class="inv-field-row">' + qtyField +
        '<div class="field" style="margin-bottom:0;"><label>Condition</label><select onchange="updateInvField(\''+item.key+'\',\'condition\',this.value)">' +
          ['New','Good','Fair','Damaged'].map(function(c){ return '<option'+(d.condition===c?' selected':'')+'>'+c+'</option>'; }).join('') +
        '</select></div>' +
      '</div>' +
      '<div class="field"><label>Resident Label Applied?</label><div class="inv-yn-row">' +
        '<button class="inv-yn-btn'+(d.label_applied==='Yes'?' sel-yes':'')+'" onclick="updateInvField(\''+item.key+'\',\'label_applied\',\'Yes\')">Yes</button>' +
        '<button class="inv-yn-btn'+(d.label_applied==='No'?' sel-no':'')+'" onclick="updateInvField(\''+item.key+'\',\'label_applied\',\'No\')">No</button>' +
      '</div></div>' +
      '<div class="inv-photo-wrap">' +
        '<label style="display:block;font-size:11px;font-weight:600;color:var(--gray);margin-bottom:6px;text-transform:uppercase;letter-spacing:.03em;">Photo</label>' +
        photoHtml +
        '<input type="file" accept="image/*" capture="environment" id="photoInput-'+item.key+'" style="display:none;" onchange="handleItemPhoto(event,\''+item.key+'\')">' +
      '</div>' +
      '<div class="field" style="margin-bottom:0;"><label>Comments</label><textarea rows="2" oninput="updateInvField(\''+item.key+'\',\'comments\',this.value)">'+(d.comments||'')+'</textarea></div>' +
    '</div>';
  }).join('');
}

function updateInvField(key, field, value) {
  if (!invSelected[key]) return;
  invSelected[key][field] = value;
  if (field === 'condition' || field === 'label_applied') renderInvExpandList();
}

function handleItemPhoto(e, key) {
  var file = e.target.files[0];
  if (!file || !invSelected[key]) return;
  if (invSelected[key].photoPreviewUrl) URL.revokeObjectURL(invSelected[key].photoPreviewUrl);
  invSelected[key].photoFile = file;
  invSelected[key].photoPreviewUrl = URL.createObjectURL(file);
  renderInvExpandList();
}
function removeItemPhoto(key) {
  if (!invSelected[key]) return;
  if (invSelected[key].photoPreviewUrl) URL.revokeObjectURL(invSelected[key].photoPreviewUrl);
  invSelected[key].photoFile = null;
  invSelected[key].photoPreviewUrl = null;
  renderInvExpandList();
}

async function saveInventory() {
  var residentName = document.getElementById('inv-resident-name').value.trim();
  var room = document.getElementById('inv-room').value.trim();
  var completedBy = document.getElementById('inv-completed-by').value.trim();

  if (!residentName) { showToast('Enter the resident\'s name.', 'error'); return; }
  if (!completedBy) { showToast('Enter who completed this intake.', 'error'); return; }
  if (!Object.keys(invSelected).length) { showToast('Check at least one item.', 'error'); return; }
  localStorage.setItem('agrhodes_inv_staff', completedBy);

  var items = INVENTORY_ITEMS.filter(function(i){ return invSelected[i.key]; }).map(function(i){
    var d = invSelected[i.key];
    return {
      key: i.key, label: i.label, quantity: d.quantity, amount: d.amount, condition: d.condition,
      label_applied: d.label_applied, photo_taken: d.photoFile ? 'Yes' : 'No',
      comments: d.comments, other_desc: d.other_desc
    };
  });

  var { data: inserted, error } = await sb.from('patient_inventory').insert({
    facility_id: FACILITY_ID, resident_name: residentName, room_number: room || null,
    admission_date: new Date().toISOString().split('T')[0], completed_by: completedBy, items: items
  }).select().single();

  if (error) { showToast('Error saving: ' + error.message, 'error'); return; }

  // Upload any staged photos now that we have a record id, then patch the items JSON
  var itemsWithPhotos = INVENTORY_ITEMS.filter(function(i){ return invSelected[i.key] && invSelected[i.key].photoFile; });
  if (itemsWithPhotos.length) {
    var updatedItems = JSON.parse(JSON.stringify(items));
    for (var idx=0; idx<itemsWithPhotos.length; idx++) {
      var it = itemsWithPhotos[idx];
      var file = invSelected[it.key].photoFile;
      var ext = (file.name.split('.').pop() || 'jpg').toLowerCase().replace(/[^a-z0-9]/g,'') || 'jpg';
      var path = 'inventory/' + inserted.id + '/' + it.key + '.' + ext;
      var { error: upErr } = await sb.storage.from('round-photos').upload(path, file, { upsert:true });
      if (!upErr) {
        var pub = sb.storage.from('round-photos').getPublicUrl(path);
        var rowIdx = updatedItems.findIndex(function(u){ return u.key === it.key; });
        if (rowIdx > -1) updatedItems[rowIdx].photo_url = pub.data.publicUrl;
      }
    }
    await sb.from('patient_inventory').update({ items: updatedItems }).eq('id', inserted.id);
  }

  renderSaveSuccess(inserted.id, residentName);
}

function renderSaveSuccess(id, residentName) {
  var link = VIEW_BASE_URL + id;
  app.innerHTML =
    '<div class="card success-wrap">' +
      '<div class="success-icon">✅</div>' +
      '<div class="success-title">Inventory Saved</div>' +
      '<div class="success-sub">' + residentName + '\'s belongings have been logged.</div>' +
      '<div class="share-box">' +
        '<div style="font-size:12px;font-weight:700;color:var(--gray);margin-bottom:10px;">Scan or share to view this record later</div>' +
        '<div class="share-qr" id="successQr"></div>' +
        '<div class="share-link-row"><input type="text" readonly value="' + link + '" id="successLinkInput" onclick="this.select()"></div>' +
        '<button class="neu-btn" style="margin-top:10px;font-size:12px;" onclick="copyShareLink(\'successLinkInput\')">📋 Copy Link</button>' +
      '</div>' +
      '<button class="neu-btn primary block" style="margin-top:16px;" onclick="renderNewIntakeForm()">+ Start Another Intake</button>' +
    '</div>';
  new QRCode(document.getElementById('successQr'), { text: link, width: 150, height: 150, colorDark:'#1A1A1A', colorLight:'#FFFFFF' });
}

function copyShareLink(inputId) {
  var input = document.getElementById(inputId);
  input.select();
  try { document.execCommand('copy'); showToast('Link copied.', 'success'); }
  catch(e) { showToast('Could not copy automatically — select and copy manually.', 'error'); }
}

/* ══════════ VIEW SAVED RECORD ══════════ */
async function loadAndRenderView(id) {
  if (!id) { app.innerHTML = '<div class="center-msg">⚠ No inventory ID found in this link.</div>'; return; }
  var { data: row, error } = await sb.from('patient_inventory').select('*').eq('id', id).maybeSingle();
  if (error) { app.innerHTML = '<div class="center-msg">⚠ Error loading record.<br>'+error.message+'</div>'; return; }
  if (!row) { app.innerHTML = '<div class="center-msg">⚠ Inventory record not found.</div>'; return; }

  var items = row.items || [];
  var dt = new Date(row.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});

  var html = '<div class="rr-header">' +
    '<div class="rr-icon">🧳</div>' +
    '<div class="rr-name">' + row.resident_name + '</div>' +
    '<div class="rr-meta">' + (row.room_number||'') + ' · Admitted ' + row.admission_date + ' · Logged by ' + row.completed_by + ' · ' + dt + '</div>' +
  '</div>';

  html += '<div class="card"><div class="section-title">Belongings (' + items.length + ')</div>';
  if (!items.length) {
    html += '<div style="color:var(--gray-light);font-size:12.5px;text-align:center;padding:12px;">No items recorded.</div>';
  }
  items.forEach(function(it){
    var qtyText = it.key === 'cash' ? ('$' + (it.amount||'0')) : ('Qty: ' + (it.quantity!==undefined?it.quantity:'—'));
    html += '<div class="view-item-card">' +
      '<div class="view-item-header"><span class="view-item-name">' + it.label + (it.other_desc?' — '+it.other_desc:'') + '</span>' +
        '<span class="view-item-badge">' + (it.condition||'') + '</span></div>' +
      '<div class="view-item-meta">' + qtyText + ' · Label Applied: ' + (it.label_applied||'—') + ' · Photo: ' + (it.photo_taken||'No') +
        (it.comments ? '<br>"' + it.comments + '"' : '') + '</div>' +
      (it.photo_url ? '<img class="view-item-photo" src="'+it.photo_url+'" onclick="window.open(this.src)">' : '') +
    '</div>';
  });
  html += '</div>';
  html += '<div style="text-align:center;"><button class="neu-btn" onclick="window.location.hash=\'new\';renderNewIntakeForm();">+ Start a New Intake</button></div>';

  app.innerHTML = html;
}

window.addEventListener('hashchange', init);
init();
</script>
</body>
</html>
