<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A.G. Rhodes — Zone Round QR Manager</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F9FA;--surface:#FFFFFF;--surface-2:#F3F4F6;--border:#E5E7EB;
  --text:#0F1117;--text-2:#6B7280;--text-3:#9CA3AF;
  --blue:#3B82F6;--brand:#7C6FF0;--green:#059669;--red:#DC2626;
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;}
.wrap{max-width:1100px;margin:0 auto;padding:32px 24px 80px;}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:28px;}
h1{font-size:24px;font-weight:800;letter-spacing:-0.02em;margin:0;}
.sub{font-size:13px;color:var(--text-2);margin-top:4px;}
.tabs{display:flex;gap:4px;background:var(--surface-2);border-radius:10px;padding:4px;margin-bottom:24px;width:fit-content;}
.tab-btn{padding:8px 16px;border-radius:8px;border:none;background:none;font-family:inherit;
  font-size:13px;font-weight:600;color:var(--text-2);cursor:pointer;}
.tab-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}
.panel{display:none;} .panel.active{display:block;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-bottom:16px;}
.card-title{font-size:14px;font-weight:700;margin-bottom:12px;}
.bulk-form{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:end;}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em;}
.field input,.field select{width:100%;padding:9px 10px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:13px;}
.btn{background:var(--blue);color:white;border:none;border-radius:8px;padding:10px 18px;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer;}
.btn.outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-top:16px;}
.qr-tile{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
.qr-tile canvas,.qr-tile img{width:100%;max-width:120px;margin:0 auto 8px;display:block;}
.qr-tile-name{font-size:12.5px;font-weight:700;margin-bottom:2px;}
.qr-tile-meta{font-size:10.5px;color:var(--text-3);}
.qr-tile-id{font-family:'DM Mono',monospace;font-size:9px;color:var(--text-3);margin-top:6px;word-break:break-all;}
.dept-section{margin-bottom:28px;}
.dept-header{font-size:13px;font-weight:700;color:var(--text-2);text-transform:uppercase;
  letter-spacing:.05em;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.stats-row{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:16px;}
.stat-num{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;}
.stat-label{font-size:11px;color:var(--text-2);margin-top:2px;}
.heatmap-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:8px;}
.heat-tile{aspect-ratio:1;border-radius:10px;display:flex;align-items:center;
  justify-content:center;cursor:pointer;font-size:11px;font-weight:700;color:white;padding:6px;text-align:center;}
.heat-green{background:var(--green);} .heat-yellow{background:#D97706;}
.heat-orange{background:#EA580C;} .heat-red{background:var(--red);}
.heat-gray{background:#D1D5DB;color:#6B7280;}
@media print {
  .no-print{display:none!important;}
  .grid{grid-template-columns:repeat(3,1fr);}
  .qr-tile{break-inside:avoid;border:1px solid #000;}
}

/* ── Round Detail Modal ── */
#roundModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:100;
  align-items:center;justify-content:center;padding:16px;}
#roundModal.open{display:flex;}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:16px;
  width:100%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15);}
.modal-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-between;gap:12px;position:sticky;top:0;
  background:var(--surface);z-index:1;}
.modal-title{font-size:17px;font-weight:800;letter-spacing:-0.01em;}
.modal-meta{font-size:12px;color:var(--text-2);margin-top:3px;}
.modal-close{background:none;border:1px solid var(--border);border-radius:8px;
  width:32px;height:32px;cursor:pointer;font-size:18px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;color:var(--text-2);}
.modal-body{padding:20px;}
.modal-section{margin-bottom:20px;}
.modal-section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.05em;
  color:var(--text-2);margin-bottom:10px;}
.check-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.check-item{display:flex;align-items:center;justify-content:space-between;
  background:var(--surface-2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;}
.check-label{font-size:12.5px;font-weight:600;color:var(--text);}
.check-val{font-size:12px;font-weight:700;padding:3px 8px;border-radius:999px;}
.val-pass{background:rgba(5,150,105,.12);color:var(--green);}
.val-fail{background:rgba(220,38,38,.12);color:var(--red);}
.val-yes{background:rgba(5,150,105,.12);color:var(--green);}
.val-no{background:rgba(220,38,38,.12);color:var(--red);}
.val-other{background:var(--surface-2);color:var(--text-2);}
.issue-row{background:rgba(220,38,38,.06);border:1px solid rgba(220,38,38,.2);
  border-radius:10px;padding:12px 14px;margin-bottom:8px;}
.issue-row-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;}
.issue-type{font-size:12px;font-weight:700;color:var(--red);}
.issue-priority{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;}
.prio-High{background:rgba(220,38,38,.15);color:var(--red);}
.prio-Medium{background:rgba(234,88,12,.15);color:#EA580C;}
.prio-Low{background:rgba(5,150,105,.12);color:var(--green);}
.issue-desc{font-size:12.5px;color:var(--text-2);}
.no-round-msg{text-align:center;padding:32px;color:var(--text-2);font-size:13px;}
.modal-compliance{display:flex;align-items:center;gap:10px;margin-bottom:16px;
  background:var(--surface-2);border:1px solid var(--border);border-radius:10px;padding:14px;}
.compliance-num{font-family:'DM Mono',monospace;font-size:28px;font-weight:500;}
.compliance-label{font-size:12px;color:var(--text-2);}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <div>
      <h1>Zone Round QR Manager</h1>
      <div class="sub">Generate, print, and track scannable codes for resident rooms and Environment of Care areas</div>
    </div>
    <button class="btn outline no-print" onclick="window.print()">🖨 Print This View</button>
  </div>

  <div class="tabs no-print">
    <button class="tab-btn active" onclick="switchTab('dashboard')">Dashboard</button>
    <button class="tab-btn" onclick="switchTab('rooms')">Resident Rooms</button>
    <button class="tab-btn" onclick="switchTab('eoc')">EOC Areas</button>
  </div>

  <div class="panel active" id="panel-dashboard">
    <div class="stats-row" id="statsRow"></div>
    <div class="card">
      <div class="card-title">Today's Rounding Heat Map</div>
      <div class="heatmap-grid" id="heatmapGrid"></div>
    </div>
  </div>

  <div class="panel" id="panel-rooms">
    <div class="card no-print">
      <div class="card-title">Generate Room QR Codes in Bulk</div>
      <div class="bulk-form">
        <div class="field"><label>Unit</label>
          <select id="bulk-unit">
            <option>Taylor Hall</option><option>ICF Hall</option>
            <option>Garden Hall</option><option>Victoria Court</option>
          </select>
        </div>
        <div class="field"><label>Start Room #</label><input type="number" id="bulk-start" placeholder="101"></div>
        <div class="field"><label>End Room #</label><input type="number" id="bulk-end" placeholder="140"></div>
        <button class="btn" onclick="generateBulkRooms()">Generate</button>
      </div>
    </div>
    <div id="roomsGrid"></div>
  </div>

  <div class="panel" id="panel-eoc">
    <div class="card no-print">
      <div class="card-title">Environment of Care Areas</div>
      <div class="sub">These 9 standard areas are seeded automatically. QR codes are generated below.</div>
    </div>
    <div id="eocGrid"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js">
function openRoundModal(loc, round, issues) {
  document.getElementById('roundModal').classList.add('open');
  document.getElementById('modalTitle').textContent = loc.display_name;

  var metaParts = [];
  if (loc.unit) metaParts.push(loc.unit);
  if (loc.eoc_department) metaParts.push(loc.eoc_department);
  if (round) {
    var dt = new Date(round.rounded_at);
    metaParts.push('Rounded at ' + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));
    metaParts.push('By: ' + round.rounded_by);
  }
  document.getElementById('modalMeta').textContent = metaParts.join(' · ');

  var body = document.getElementById('modalBody');
  body.innerHTML = '';

  if (!round) {
    body.innerHTML = '<div class="no-round-msg">🔘 Not yet rounded today</div>';
    return;
  }

  // EOC compliance score
  if (round.round_type === 'eoc' && round.eoc_compliance_pct !== null) {
    var compColor = round.eoc_compliance_pct >= 90 ? '#059669' :
                    round.eoc_compliance_pct >= 70 ? '#D97706' : '#DC2626';
    body.innerHTML += '<div class="modal-compliance">' +
      '<div class="compliance-num" style="color:'+compColor+'">' +
        Math.round(round.eoc_compliance_pct) + '%' +
      '</div>' +
      '<div><div style="font-size:13px;font-weight:700">EOC Compliance Score</div>' +
      '<div class="compliance-label">Based on Pass/Fail items this round</div></div></div>';
  }

  // Checklist items
  var checksHtml = '';
  if (round.round_type === 'room') {
    var ROOM_LABELS = {
      // Resident Status
      resident_contacted:'Resident Contacted', satisfaction:'Satisfied With Care',
      no_concerns:'No Concerns Expressed',
      // Safety
      call_light:'Call Light Within Reach', bed_low_locked:'Bed Low / Locked',
      room_clutter:'Room Free of Clutter',
      // Cleanliness
      floor_clean:'Floor Clean', bathroom_clean:'Bathroom Clean', trash_removed:'Trash Removed',
      // Environment
      curtains_clean:'Curtains Clean', odor_free:'No Offensive Odors', lighting:'Adequate Lighting',
      // Equipment
      furniture_intact:'Furniture Intact', equipment_functioning:'Wheelchair / Bed Functioning',
      no_maintenance:'No Maintenance Concerns',
    };
    // Environmental score
    var ENV_KEYS = ['call_light','bed_low_locked','room_clutter','floor_clean','bathroom_clean',
      'trash_removed','curtains_clean','odor_free','lighting','furniture_intact',
      'equipment_functioning','no_maintenance'];
    var answered = ENV_KEYS.filter(function(k){ return round[k]; });
    if (answered.length) {
      var passes = answered.filter(function(k){ return round[k]==='pass'; }).length;
      var pct = Math.round((passes/answered.length)*100);
      var cls2 = pct>=90?'green':pct>=75?'amber':'red';
      var emoji = pct>=90?'🟢':pct>=75?'🟡':'🔴';
      var label2 = pct>=90?'Pass':pct>=75?'Needs Attention':'Immediate Action Required';
      body.innerHTML += '<div class="modal-compliance" style="border-radius:10px;padding:14px;margin-bottom:16px;' +
        'background:'+(pct>=90?'rgba(5,150,105,.08)':pct>=75?'rgba(245,158,11,.08)':'rgba(220,38,38,.08)')+';' +
        'border:1.5px solid '+(pct>=90?'#059669':pct>=75?'#D97706':'#DC2626')+';">' +
        '<div class="compliance-num" style="color:'+(pct>=90?'#059669':pct>=75?'#D97706':'#DC2626')+'">'+emoji+' '+pct+'%</div>' +
        '<div><div style="font-size:13px;font-weight:700">Environmental Score — '+label2+'</div>' +
        '<div class="compliance-label">'+passes+' of '+answered.length+' items passed</div></div></div>';
    }
    checksHtml = '<div class="check-grid">';
    var SECTIONS = {
      'Resident Status':['resident_contacted','satisfaction','no_concerns'],
      'Safety':['call_light','bed_low_locked','room_clutter'],
      'Cleanliness':['floor_clean','bathroom_clean','trash_removed'],
      'Environment':['curtains_clean','odor_free','lighting'],
      'Equipment':['furniture_intact','equipment_functioning','no_maintenance'],
    };
    Object.keys(SECTIONS).forEach(function(section) {
      var keys = SECTIONS[section].filter(function(k){ return round[k]; });
      if (!keys.length) return;
      checksHtml += '<div style="grid-column:1/-1;font-size:10.5px;font-weight:700;' +
        'text-transform:uppercase;letter-spacing:.05em;color:#6B7280;margin:8px 0 4px">'+section+'</div>';
      keys.forEach(function(k) {
        var val = round[k];
        var cls = (val==='pass'||val==='yes') ? 'val-pass' : (val==='fail'||val==='no') ? 'val-fail' : 'val-other';
        checksHtml += '<div class="check-item">' +
          '<span class="check-label">' + ROOM_LABELS[k] + '</span>' +
          '<span class="check-val ' + cls + '">' + val + '</span></div>';
      });
    });
    checksHtml += '</div>';
  } else if (round.eoc_scores) {
    var scores = typeof round.eoc_scores === 'string' ? JSON.parse(round.eoc_scores) : round.eoc_scores;
    checksHtml = '<div class="check-grid">';
    Object.keys(scores).forEach(function(k) {
      var val = scores[k];
      var label = k.replace(/_/g,' ').replace(/\w/g,function(l){return l.toUpperCase();});
      var cls = val==='pass' ? 'val-pass' : val==='fail' ? 'val-fail' : 'val-other';
      checksHtml += '<div class="check-item">' +
        '<span class="check-label">' + label + '</span>' +
        '<span class="check-val ' + cls + '">' + val + '</span></div>';
    });
    checksHtml += '</div>';
  }

  if (checksHtml) {
    body.innerHTML += '<div class="modal-section">' +
      '<div class="modal-section-title">Checklist Results</div>' + checksHtml + '</div>';
  }

  // Issues
  if (issues && issues.length) {
    var issHtml = '<div class="modal-section"><div class="modal-section-title">Issues Created (' + issues.length + ')</div>';
    issues.forEach(function(i) {
      issHtml += '<div class="issue-row">' +
        '<div class="issue-row-header">' +
          '<span class="issue-type">⚠ ' + i.issue_type + '</span>' +
          '<span class="issue-priority prio-' + i.priority + '">' + i.priority + '</span>' +
        '</div>' +
        '<div class="issue-desc">' + (i.issue_description || i.quick_action || '—') + '</div>' +
        (i.photo_url ? '<img src="' + i.photo_url + '" style="width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover;" onclick="window.open(this.src)">' : '') +
        '</div>';
    });
    issHtml += '</div>';
    body.innerHTML += issHtml;
  } else {
    body.innerHTML += '<div class="modal-section">' +
      '<div class="modal-section-title">Issues</div>' +
      '<div style="font-size:13px;color:var(--green);font-weight:600">✓ No issues documented</div>' +
      '</div>';
  }
}

function closeModal() {
  document.getElementById('roundModal').classList.remove('open');
}
document.getElementById('roundModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

</script>

        (i.photo_url ? '<img src="' + i.photo_url + '" style="width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover;" onclick="window.open(this.src)">' : '') +
        '</div>';
    });
    issHtml += '</div>';
    body.innerHTML += issHtml;
  } else {
    body.innerHTML += '<div class="modal-section">' +
      '<div class="modal-section-title">Issues</div>' +
      '<div style="font-size:13px;color:var(--green);font-weight:600">✓ No issues documented</div>' +
      '</div>';
  }
}

function closeModal() {
  document.getElementById('roundModal').classList.remove('open');
}
document.getElementById('roundModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

<script>
// ⚠ CONFIGURE: same Supabase project as your meal check-in app
const SUPABASE_URL = 'https://gtbiatetqyuxwuehwilr.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imd0YmlhdGV0cXl1eHd1ZWh3aWxyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk4MTgzMjcsImV4cCI6MjA5NTM5NDMyN30.C9nsE4uMqLt8DZTWXZVLToHWMG3ApKyb702hDQSIr34';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ⚠ CONFIGURE: your Atlanta facility's UUID (run: select id from facilities where subdomain='agrhodes';)
const FACILITY_ID = '30f74349-3ab8-483b-a587-f372c0fbd413';

var BASE_URL = window.location.origin + '/round.html#round=';

function switchTab(tab) {
  document.querySelectorAll('.tab-btn').forEach(function(b){b.classList.remove('active');});
  document.querySelectorAll('.panel').forEach(function(p){p.classList.remove('active');});
  event.target.classList.add('active');
  document.getElementById('panel-'+tab).classList.add('active');
  if (tab==='dashboard') loadDashboard();
  if (tab==='rooms') loadRooms();
  if (tab==='eoc') loadEOC();
}

function renderQRTile(loc, container) {
  var tile = document.createElement('div');
  tile.className = 'qr-tile';
  var qrDiv = document.createElement('div');
  tile.appendChild(qrDiv);
  var nameDiv = document.createElement('div');
  nameDiv.className = 'qr-tile-name'; nameDiv.textContent = loc.display_name;
  tile.appendChild(nameDiv);
  var metaDiv = document.createElement('div');
  metaDiv.className = 'qr-tile-meta';
  metaDiv.textContent = loc.location_type === 'room' ? (loc.unit||'') : (loc.eoc_department||'');
  tile.appendChild(metaDiv);
  var idDiv = document.createElement('div');
  idDiv.className = 'qr-tile-id'; idDiv.textContent = loc.qr_identifier;
  tile.appendChild(idDiv);
  container.appendChild(tile);
  new QRCode(qrDiv, { text: BASE_URL + loc.qr_identifier, width:120, height:120,
    colorDark:'#0F1117', colorLight:'#FFFFFF' });
}

async function loadRooms() {
  var grid = document.getElementById('roomsGrid');
  grid.innerHTML = '<div class="sub">Loading…</div>';
  var { data: rooms, error } = await sb.from('room_qr_codes').select('*')
    .eq('facility_id', FACILITY_ID).eq('location_type','room').eq('is_active', true);
  if (error) { grid.innerHTML = '<div class="card sub">Error: '+error.message+'</div>'; return; }
  if (!rooms.length) { grid.innerHTML = '<div class="card sub">No rooms yet — generate some above.</div>'; return; }
  var byUnit = {};
  rooms.forEach(function(r){ (byUnit[r.unit]=byUnit[r.unit]||[]).push(r); });
  grid.innerHTML = '';
  Object.keys(byUnit).forEach(function(unit) {
    var section = document.createElement('div');
    section.className = 'dept-section';
    section.innerHTML = '<div class="dept-header">'+unit+' ('+byUnit[unit].length+' rooms)</div>';
    var gridDiv = document.createElement('div'); gridDiv.className = 'grid';
    byUnit[unit].sort(function(a,b){return (+a.room_number)-(+b.room_number);})
      .forEach(function(r){ renderQRTile(r, gridDiv); });
    section.appendChild(gridDiv);
    grid.appendChild(section);
  });
}

async function generateBulkRooms() {
  var unit = document.getElementById('bulk-unit').value;
  var start = +document.getElementById('bulk-start').value;
  var end = +document.getElementById('bulk-end').value;
  if (!start || !end || end < start) { alert('Enter a valid room range'); return; }
  var rows = [];
  for (var n = start; n <= end; n++) {
    rows.push({
      facility_id: FACILITY_ID, location_type: 'room', room_number: String(n),
      unit: unit, display_name: 'Room ' + n, qr_identifier: 'agrhodes-atl-room-' + n,
    });
  }
  var { error } = await sb.from('room_qr_codes').upsert(rows, { onConflict: 'qr_identifier' });
  if (error) { alert('Error: ' + error.message); return; }
  alert('✓ Generated ' + rows.length + ' room QR codes');
  loadRooms();
}

async function loadEOC() {
  var grid = document.getElementById('eocGrid');
  grid.innerHTML = '<div class="sub">Loading…</div>';
  var { data: eoc, error } = await sb.from('room_qr_codes').select('*')
    .eq('facility_id', FACILITY_ID).eq('location_type','eoc_area').eq('is_active', true);
  if (error) { grid.innerHTML = '<div class="card sub">Error: '+error.message+'</div>'; return; }
  var byDept = {};
  eoc.forEach(function(e){ (byDept[e.eoc_department]=byDept[e.eoc_department]||[]).push(e); });
  grid.innerHTML = '';
  Object.keys(byDept).forEach(function(dept) {
    var section = document.createElement('div');
    section.className = 'dept-section';
    section.innerHTML = '<div class="dept-header">'+dept+'</div>';
    var gridDiv = document.createElement('div'); gridDiv.className = 'grid';
    byDept[dept].forEach(function(loc){ renderQRTile(loc, gridDiv); });
    section.appendChild(gridDiv);
    grid.appendChild(section);
  });
}

async function loadDashboard() {
  var today = new Date().toISOString().split('T')[0];
  var { data: locations } = await sb.from('room_qr_codes').select('*')
    .eq('facility_id', FACILITY_ID).eq('is_active', true);
  var { data: roundsToday } = await sb.from('zone_rounds').select('*')
    .eq('facility_id', FACILITY_ID).gte('rounded_at', today);
  var { data: openIssues } = await sb.from('zone_issues').select('*')
    .eq('facility_id', FACILITY_ID).eq('status','Open');

  var roundedIds = new Set((roundsToday||[]).map(function(r){return r.qr_identifier;}));
  var highPriority = (openIssues||[]).filter(function(i){return i.priority==='High';}).length;
  var completionRate = locations.length ? Math.round((roundedIds.size/locations.length)*100) : 0;

  document.getElementById('statsRow').innerHTML =
    statCard(roundedIds.size, 'Rounded Today') +
    statCard(locations.length - roundedIds.size, 'Remaining') +
    statCard((openIssues||[]).length, 'Issues Open') +
    statCard(highPriority, 'High Priority') +
    statCard(completionRate+'%', 'Completion Rate');

  var hmGrid = document.getElementById('heatmapGrid');
  hmGrid.innerHTML = '';
  locations.forEach(function(loc) {
    var todaysRound = (roundsToday||[]).filter(function(r){return r.qr_identifier===loc.qr_identifier;})
      .sort(function(a,b){return new Date(b.rounded_at)-new Date(a.rounded_at);})[0];
    var issuesForLoc = (openIssues||[]).filter(function(i){
      return todaysRound && i.round_id === todaysRound.id;
    });
    var cls = 'heat-gray';
    if (todaysRound) {
      if (issuesForLoc.length) {
        var hasHigh = issuesForLoc.some(function(i){return i.priority==='High';});
        var hasMed = issuesForLoc.some(function(i){return i.priority==='Medium';});
        cls = hasHigh ? 'heat-red' : hasMed ? 'heat-orange' : 'heat-yellow';
      } else { cls = 'heat-green'; }
    }
    var tile = document.createElement('div');
    tile.className = 'heat-tile ' + cls;
    tile.textContent = loc.room_number || (loc.eoc_section||'').replace(/_/g,' ');
    tile.onclick = (function(l, r, issues) {
      return function() { openRoundModal(l, r, issues); };
    })(loc, todaysRound, issuesForLoc);
    hmGrid.appendChild(tile);
  });
}

function statCard(num, label) {
  return '<div class="stat-card"><div class="stat-num">'+num+'</div><div class="stat-label">'+label+'</div></div>';
}

loadDashboard();

function openRoundModal(loc, round, issues) {
  document.getElementById('roundModal').classList.add('open');
  document.getElementById('modalTitle').textContent = loc.display_name;

  var metaParts = [];
  if (loc.unit) metaParts.push(loc.unit);
  if (loc.eoc_department) metaParts.push(loc.eoc_department);
  if (round) {
    var dt = new Date(round.rounded_at);
    metaParts.push('Rounded at ' + dt.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'}));
    metaParts.push('By: ' + round.rounded_by);
  }
  document.getElementById('modalMeta').textContent = metaParts.join(' · ');

  var body = document.getElementById('modalBody');
  body.innerHTML = '';

  if (!round) {
    body.innerHTML = '<div class="no-round-msg">🔘 Not yet rounded today</div>';
    return;
  }

  // EOC compliance score
  if (round.round_type === 'eoc' && round.eoc_compliance_pct !== null) {
    var compColor = round.eoc_compliance_pct >= 90 ? '#059669' :
                    round.eoc_compliance_pct >= 70 ? '#D97706' : '#DC2626';
    body.innerHTML += '<div class="modal-compliance">' +
      '<div class="compliance-num" style="color:'+compColor+'">' +
        Math.round(round.eoc_compliance_pct) + '%' +
      '</div>' +
      '<div><div style="font-size:13px;font-weight:700">EOC Compliance Score</div>' +
      '<div class="compliance-label">Based on Pass/Fail items this round</div></div></div>';
  }

  // Checklist items
  var checksHtml = '';
  if (round.round_type === 'room') {
    var ROOM_LABELS = {
      // Resident Status
      resident_contacted:'Resident Contacted', satisfaction:'Satisfied With Care',
      no_concerns:'No Concerns Expressed',
      // Safety
      call_light:'Call Light Within Reach', bed_low_locked:'Bed Low / Locked',
      room_clutter:'Room Free of Clutter',
      // Cleanliness
      floor_clean:'Floor Clean', bathroom_clean:'Bathroom Clean', trash_removed:'Trash Removed',
      // Environment
      curtains_clean:'Curtains Clean', odor_free:'No Offensive Odors', lighting:'Adequate Lighting',
      // Equipment
      furniture_intact:'Furniture Intact', equipment_functioning:'Wheelchair / Bed Functioning',
      no_maintenance:'No Maintenance Concerns',
    };
    // Environmental score
    var ENV_KEYS = ['call_light','bed_low_locked','room_clutter','floor_clean','bathroom_clean',
      'trash_removed','curtains_clean','odor_free','lighting','furniture_intact',
      'equipment_functioning','no_maintenance'];
    var answered = ENV_KEYS.filter(function(k){ return round[k]; });
    if (answered.length) {
      var passes = answered.filter(function(k){ return round[k]==='pass'; }).length;
      var pct = Math.round((passes/answered.length)*100);
      var cls2 = pct>=90?'green':pct>=75?'amber':'red';
      var emoji = pct>=90?'🟢':pct>=75?'🟡':'🔴';
      var label2 = pct>=90?'Pass':pct>=75?'Needs Attention':'Immediate Action Required';
      body.innerHTML += '<div class="modal-compliance" style="border-radius:10px;padding:14px;margin-bottom:16px;' +
        'background:'+(pct>=90?'rgba(5,150,105,.08)':pct>=75?'rgba(245,158,11,.08)':'rgba(220,38,38,.08)')+';' +
        'border:1.5px solid '+(pct>=90?'#059669':pct>=75?'#D97706':'#DC2626')+';">' +
        '<div class="compliance-num" style="color:'+(pct>=90?'#059669':pct>=75?'#D97706':'#DC2626')+'">'+emoji+' '+pct+'%</div>' +
        '<div><div style="font-size:13px;font-weight:700">Environmental Score — '+label2+'</div>' +
        '<div class="compliance-label">'+passes+' of '+answered.length+' items passed</div></div></div>';
    }
    checksHtml = '<div class="check-grid">';
    var SECTIONS = {
      'Resident Status':['resident_contacted','satisfaction','no_concerns'],
      'Safety':['call_light','bed_low_locked','room_clutter'],
      'Cleanliness':['floor_clean','bathroom_clean','trash_removed'],
      'Environment':['curtains_clean','odor_free','lighting'],
      'Equipment':['furniture_intact','equipment_functioning','no_maintenance'],
    };
    Object.keys(SECTIONS).forEach(function(section) {
      var keys = SECTIONS[section].filter(function(k){ return round[k]; });
      if (!keys.length) return;
      checksHtml += '<div style="grid-column:1/-1;font-size:10.5px;font-weight:700;' +
        'text-transform:uppercase;letter-spacing:.05em;color:#6B7280;margin:8px 0 4px">'+section+'</div>';
      keys.forEach(function(k) {
        var val = round[k];
        var cls = (val==='pass'||val==='yes') ? 'val-pass' : (val==='fail'||val==='no') ? 'val-fail' : 'val-other';
        checksHtml += '<div class="check-item">' +
          '<span class="check-label">' + ROOM_LABELS[k] + '</span>' +
          '<span class="check-val ' + cls + '">' + val + '</span></div>';
      });
    });
    checksHtml += '</div>';
  } else if (round.eoc_scores) {
    var scores = typeof round.eoc_scores === 'string' ? JSON.parse(round.eoc_scores) : round.eoc_scores;
    checksHtml = '<div class="check-grid">';
    Object.keys(scores).forEach(function(k) {
      var val = scores[k];
      var label = k.replace(/_/g,' ').replace(/\w/g,function(l){return l.toUpperCase();});
      var cls = val==='pass' ? 'val-pass' : val==='fail' ? 'val-fail' : 'val-other';
      checksHtml += '<div class="check-item">' +
        '<span class="check-label">' + label + '</span>' +
        '<span class="check-val ' + cls + '">' + val + '</span></div>';
    });
    checksHtml += '</div>';
  }

  if (checksHtml) {
    body.innerHTML += '<div class="modal-section">' +
      '<div class="modal-section-title">Checklist Results</div>' + checksHtml + '</div>';
  }

  // Issues
  if (issues && issues.length) {
    var issHtml = '<div class="modal-section"><div class="modal-section-title">Issues Created (' + issues.length + ')</div>';
    issues.forEach(function(i) {
      issHtml += '<div class="issue-row">' +
        '<div class="issue-row-header">' +
          '<span class="issue-type">⚠ ' + i.issue_type + '</span>' +
          '<span class="issue-priority prio-' + i.priority + '">' + i.priority + '</span>' +
        '</div>' +
        '<div class="issue-desc">' + (i.issue_description || i.quick_action || '—') + '</div>' +
        (i.photo_url ? '<img src="' + i.photo_url + '" style="width:100%;border-radius:8px;margin-top:8px;max-height:200px;object-fit:cover;" onclick="window.open(this.src)">' : '') +
        '</div>';
    });
    issHtml += '</div>';
    body.innerHTML += issHtml;
  } else {
    body.innerHTML += '<div class="modal-section">' +
      '<div class="modal-section-title">Issues</div>' +
      '<div style="font-size:13px;color:var(--green);font-weight:600">✓ No issues documented</div>' +
      '</div>';
  }
}

function closeModal() {
  document.getElementById('roundModal').classList.remove('open');
}
document.getElementById('roundModal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

</script>
