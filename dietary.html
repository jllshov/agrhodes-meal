<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>A.G. Rhodes — Dietary Inventory</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #EAEEF2; --surface: #EEF1F5; --orange: #F5A623; --orange-light: #FFF3DC;
  --black: #1A1A1A; --gray: #6B7280; --gray-light: #9CA3AF;
  --green: #22C55E; --red: #EF4444; --amber: #F59E0B; --blue: #3B82F6;
  --shadow-out: 6px 6px 14px #C8CDD5, -6px -6px 14px #FFFFFF;
  --shadow-in: inset 4px 4px 10px #C8CDD5, inset -4px -4px 10px #FFFFFF;
  --shadow-card: 8px 8px 20px #C5CAD1, -8px -8px 20px #FFFFFF;
  --r: 20px; --r-sm: 12px; --r-pill: 999px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); font-family: 'Inter', sans-serif; color: var(--black); min-height: 100vh; display: flex; }

/* ── Sidebar ── */
.sidebar { width: 220px; min-height: 100vh; background: var(--surface); box-shadow: var(--shadow-card);
  padding: 28px 16px; display: flex; flex-direction: column; gap: 6px; flex-shrink: 0; position: sticky; top: 0; }
.sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 0 8px 24px;
  border-bottom: 1px solid rgba(0,0,0,.06); margin-bottom: 10px; }
.sidebar-logo-icon { width: 40px; height: 40px; border-radius: 12px; background: var(--orange);
  display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; color: white; }
.sidebar-logo-name { font-size: 13px; font-weight: 700; line-height: 1.3; }
.sidebar-logo-sub { font-size: 10px; color: var(--gray); }
.nav-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border-radius: var(--r-sm);
  cursor: pointer; font-size: 13px; font-weight: 500; color: var(--gray); transition: all .15s;
  border: none; background: none; font-family: inherit; width: 100%; text-align: left; }
.nav-item:hover { background: var(--bg); color: var(--black); }
.nav-item.active { background: var(--orange); color: white; box-shadow: 4px 4px 12px rgba(245,166,35,.4); }
.nav-icon { font-size: 16px; width: 20px; text-align: center; }
.sidebar-bottom { margin-top: auto; padding-top: 16px; border-top: 1px solid rgba(0,0,0,.06); }
.sidebar-user { display: flex; align-items: center; gap: 10px; padding: 10px 8px; }
.user-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--orange);
  display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 700; color: white; }
.user-name { font-size: 12.5px; font-weight: 600; }
.user-role { font-size: 10.5px; color: var(--gray); }

/* ── Main ── */
.main { flex: 1; padding: 28px 32px; overflow-y: auto; }
.page-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; flex-wrap: wrap; gap: 12px; }
.page-title { font-size: 26px; font-weight: 800; letter-spacing: -.02em; }
.page-sub { font-size: 13px; color: var(--gray); margin-top: 3px; }
.header-actions { display: flex; gap: 10px; }

.neu-btn { padding: 10px 20px; border-radius: var(--r-pill); border: none; cursor: pointer;
  font-family: inherit; font-size: 13px; font-weight: 600; background: var(--surface);
  box-shadow: var(--shadow-out); color: var(--black); transition: all .15s; }
.neu-btn:active { box-shadow: var(--shadow-in); }
.neu-btn.primary { background: var(--orange); color: white; box-shadow: 4px 4px 12px rgba(245,166,35,.5); }
.neu-btn.small { padding: 7px 14px; font-size: 11.5px; }

.tab-row { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.tab-pill { padding: 9px 18px; border-radius: var(--r-pill); border: none; cursor: pointer;
  font-family: inherit; font-size: 12.5px; font-weight: 600; color: var(--gray);
  background: var(--surface); box-shadow: var(--shadow-out); }
.tab-pill.active { background: var(--orange); color: white; box-shadow: 4px 4px 12px rgba(245,166,35,.4); }
